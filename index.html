<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
<script>
"use strict";
/* ===================== ÉTAT ===================== */
const DEFAULT=()=>({
  config:{name:"Tournoi Cap Homard",poolSizeTarget:5,qualifPerPool:3,points:21,courts:5,courtNames:["Terrain 1","Terrain 2","Terrain 3","Terrain 4","Terrain 5"],centralIndex:-1,demoTeams:40},
  teams:[], qualif:{pools:null}, haute:{pools:null}, basse:{pools:null}, finals:{haute:null,basse:null}
});
const CREDS={user:"volleypei",pass:"volleypei974"};
let DB=loadDB()||migrate()||{tournaments:[]};
let authed=localStorage.getItem("capAuth")==="1";
let currentId=null, route="config", finalTab="haute", editId=null;
let S=DEFAULT(); // référence vivante vers le tournoi ouvert
function loadDB(){try{const r=localStorage.getItem("capHomardDB");return r?JSON.parse(r):null;}catch(e){return null;}}
function migrate(){ // récupère un éventuel ancien tournoi unique
  try{const r=localStorage.getItem("capHomard");if(r){const st=JSON.parse(r);return {tournaments:[{id:uid(),name:(st.config&&st.config.name)||"Tournoi",date:"",location:"",createdAt:Date.now(),updatedAt:Date.now(),state:st}]};}}catch(e){}
  return null;
}
function cur(){return DB.tournaments.find(t=>t.id===currentId);}
function persist(){try{if(currentId){const t=cur();if(t)t.updatedAt=Date.now();}localStorage.setItem("capHomardDB",JSON.stringify(DB));localStorage.setItem("capAuth",authed?"1":"0");}catch(e){}}
const save=persist; // les fonctions du moteur appellent save()
function uid(){return Math.random().toString(36).slice(2,9);}

/* ===================== MOTEUR ===================== */
function roundRobin(N){
  let arr=[...Array(N).keys()]; if(N%2===1)arr.push(-1);
  const n=arr.length, rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];let bye=null;
    for(let i=0;i<n/2;i++){const a=arr[i],b=arr[n-1-i];
      if(a===-1||b===-1)bye=(a===-1?b:a);else pairs.push([a,b]);}
    rounds.push({pairs,bye}); arr.splice(1,0,arr.pop()); }
  return rounds;
}
function buildPool(ids){
  const N=ids.length, rounds=roundRobin(N), matches=[], refC=Array(N).fill(0);
  rounds.forEach(rd=>rd.pairs.forEach(([a,b])=>{
    let best=-1,bc=Infinity;
    for(let k=0;k<N;k++){if(k===a||k===b)continue;if(refC[k]<bc){bc=refC[k];best=k;}}
    if(best>=0)refC[best]++; matches.push({i:a,j:b,ref:best});
  }));
  return {teams:[...ids],matches,scores:matches.map(()=>["",""])};
}
function poolStandings(pool){
  const t=pool.teams.map((id,i)=>({i,id,pf:0,pc:0,w:0,played:0,coeff:0,rank:0}));
  pool.matches.forEach((m,idx)=>{const s=pool.scores[idx];
    if(!s||s[0]===""||s[1]===""||s[0]==null||s[1]==null)return;
    const a=+s[0],b=+s[1];if(isNaN(a)||isNaN(b))return;
    const A=t[m.i],B=t[m.j];A.pf+=a;A.pc+=b;B.pf+=b;B.pc+=a;A.played++;B.played++;
    if(a>b)A.w++;else if(b>a)B.w++;});
  t.forEach(x=>x.coeff=x.pc===0?(x.pf>0?Infinity:0):x.pf/x.pc);
  const any=t.some(x=>x.played>0);
  const ordered=[...t].sort((x,y)=>(y.coeff-x.coeff)||(y.w-x.w)||((y.pf-y.pc)-(x.pf-x.pc)));
  ordered.forEach((x,r)=>x.rank=any?r+1:0);
  const complete=pool.scores.length>0&&pool.scores.every(s=>s[0]!==""&&s[1]!==""&&s[0]!=null&&s[1]!=null);
  return {teams:t,ordered,complete};
}
/* --- Moteur de répartition optimale (priorités : format choisi > terrains/rotations > aucune équipe seule > éviter 6 > adapter 3/4/5) --- */
function minSize(){return S.config.qualifPerPool+1;} // taille > nb de qualifiés
function effTarget(){return Math.max(minSize(),Math.min(5,S.config.poolSizeTarget||5));}
function evenPartition(T,k){const base=Math.floor(T/k),rem=T-base*k;return Array.from({length:k},(_,i)=>base+(i<rem?1:0));}
// clé lexicographique (plus petit = meilleur) : [poules de 6+, -(poules à la taille cible), écart total, poules de 3, nb de poules]
function sizeKey(sizes,t){let six=0,atT=0,dev=0,three=0;sizes.forEach(s=>{if(s>=6)six++;if(s===t)atT++;dev+=Math.abs(s-t);if(s===3)three++;});return [six,-atT,dev,three,sizes.length];}
function keyLess(a,b){for(let i=0;i<a.length;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}
function bestSizes(T){
  if(T<=0)return[];
  const m=minSize(),t=effTarget();
  let best=null,bestKey=null;
  for(let k=1;k<=T;k++){
    const s=evenPartition(T,k);
    if(Math.min(...s)<m)continue;       // jamais une poule ≤ nb de qualifiés
    if(Math.max(...s)>6)continue;       // jamais 7+
    const key=sizeKey(s,t);
    if(!bestKey||keyLess(key,bestKey)){bestKey=key;best=s;}
  }
  if(best)return best;
  // repli ultime (effectif minuscule incompatible) : le moins mauvais sans 7+
  for(let k=1;k<=T;k++){const s=evenPartition(T,k);if(Math.max(...s)<=6)return s;}
  return [T];
}
function feasibleClean(N){if(N===0)return true;const s=bestSizes(N);return Math.max(...s)<=5&&Math.min(...s)>=minSize();}
function makePoolsSized(seedIds,otherIds,sizes){
  const pools=sizes.map(()=>[]);
  const seeds=[...seedIds],others=[...otherIds];
  for(let i=0;i<sizes.length;i++){if(seeds.length)pools[i].push(seeds.shift());}
  const rest=[...seeds,...others];let fwd=true;
  while(rest.length){const order=fwd?[...sizes.keys()]:[...sizes.keys()].reverse();let placed=false;
    for(const p of order){if(pools[p].length<sizes[p]&&rest.length){pools[p].push(rest.shift());placed=true;}}
    fwd=!fwd;if(!placed)break;}
  return pools.map(ids=>buildPool(ids));
}
function repoolSized(recs,sizes){
  const sorted=[...recs].sort((a,b)=>a.pos-b.pos||b.coeff-a.coeff);
  const pools=sizes.map(()=>[]);let fwd=true,idx=0;
  while(idx<sorted.length){const order=fwd?[...sizes.keys()]:[...sizes.keys()].reverse();let placed=false;
    for(const p of order){if(pools[p].length<sizes[p]&&idx<sorted.length){pools[p].push(sorted[idx].id);idx++;placed=true;}}
    fwd=!fwd;if(!placed)break;}
  return pools.map(ids=>buildPool(ids));
}
/* --- Assignation après-midi : priorité 1) éviter les re-matchs 2) disperser les classements 3) tailles 4) équilibre niveau --- */
function morningCoPool(){ // id -> Set des coéquipiers de poule du matin
  const m=new Map();
  if(S.qualif.pools)S.qualif.pools.forEach(p=>{const ids=p.teams;ids.forEach(a=>{const set=m.get(a)||new Set();ids.forEach(b=>{if(b!==a)set.add(b);});m.set(a,set);});});
  return m;
}
function groupTiers(recs){const m={};recs.forEach(r=>{(m[r.pos]=m[r.pos]||[]).push(r);});return Object.keys(m).map(Number).sort((a,b)=>a-b).map(pos=>m[pos].slice().sort((a,b)=>b.coeff-a.coeff));}
function reCount(arr,rec,co){const s=co.get(rec.id);if(!s)return 0;let c=0;for(const x of arr)if(s.has(x.id))c++;return c;}
function totalRe(pools,co){let c=0;pools.forEach(P=>{for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const s=co.get(P[i].id);if(s&&s.has(P[j].id))c++;}});return c;}
function tierPen(pools){let p=0;pools.forEach(P=>{const b={};P.forEach(r=>b[r.pos]=(b[r.pos]||0)+1);Object.values(b).forEach(n=>{if(n>1)p+=n-1;});});return p;}
function levelPen(pools){const a=pools.map(P=>P.length?P.reduce((s,r)=>s+Math.min(r.coeff,9),0)/P.length:0);const mn=a.reduce((s,v)=>s+v,0)/(a.length||1);return a.reduce((s,v)=>s+(v-mn)*(v-mn),0);}
function scoreAssign(pools,co){return [totalRe(pools,co),tierPen(pools),levelPen(pools)];}
function lessK(a,b){for(let i=0;i<a.length;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}
function buildAfternoonPools(recs,sizes,co){
  if(recs.length===0)return {poolIds:[],reMatch:0};
  let best=null;
  for(let att=0;att<60;att++){
    const tiers=groupTiers(recs);let order=[];
    tiers.forEach(t=>{order=order.concat(att===0?t:shuffle(t));});
    const pools=sizes.map(()=>[]);
    for(const rec of order){
      let bp=-1,bk=null;
      for(let p=0;p<pools.length;p++){
        if(pools[p].length>=sizes[p])continue;
        const key=[reCount(pools[p],rec,co),pools[p].filter(x=>x.pos===rec.pos).length,pools[p].length,pools[p].reduce((a,x)=>a+Math.min(x.coeff,9),0),Math.random()];
        if(bk===null||lessK(key,bk)){bk=key;bp=p;}
      }
      if(bp<0)bp=pools.findIndex((P,p)=>P.length<sizes[p]);
      pools[bp].push(rec);
    }
    const sc=scoreAssign(pools,co);
    if(!best||lessK(sc,best.sc))best={pools:pools.map(P=>P.slice()),sc};
  }
  // amélioration locale par échanges (réduit re-matchs puis déséquilibres)
  let guard=0,improved=true;
  while(improved&&guard++<25){
    improved=false;const P=best.pools;
    for(let a=0;a<P.length&&!improved;a++)for(let b=a+1;b<P.length&&!improved;b++)
      for(let i=0;i<P[a].length&&!improved;i++)for(let j=0;j<P[b].length;j++){
        const t=P[a][i];P[a][i]=P[b][j];P[b][j]=t;
        const sc=scoreAssign(P,co);
        if(lessK(sc,best.sc)){best.sc=sc;improved=true;break;}
        const t2=P[a][i];P[a][i]=P[b][j];P[b][j]=t2;
      }
  }
  return {poolIds:best.pools.map(P=>P.map(r=>r.id)),reMatch:best.sc[0]};
}
function rankAllFromPools(pools){
  const byPos={};
  pools.forEach(p=>poolStandings(p).ordered.forEach((e,idx)=>{(byPos[idx]=byPos[idx]||[]).push({id:e.id,coeff:e.coeff});}));
  const out=[];
  Object.keys(byPos).map(Number).sort((a,b)=>a-b).forEach(pos=>byPos[pos].sort((a,b)=>b.coeff-a.coeff).forEach(x=>out.push(x)));
  return out;
}
function seedList(n){let a=[1,2];while(a.length<n){const m=a.length*2+1,b=[];a.forEach(x=>{b.push(x);b.push(m-x);});a=b;}return a;}
function makeBracket(ranked){
  if(ranked.length<2)return null;
  let size=1;while(size*2<=ranked.length)size*=2;
  const qual=ranked.slice(0,size).map((x,i)=>({id:x.id,seed:i+1}));
  const order=seedList(size),r1=[];
  for(let k=0;k<size;k+=2)r1.push({a:qual[order[k]-1],b:qual[order[k+1]-1],sa:"",sb:""});
  return {size,rounds:[r1],extra:{petite:{sa:"",sb:""}}};
}
function bWin(m){if(m.sa===""||m.sb==="")return null;return +m.sa>+m.sb?m.a:m.b;}
function bLose(m){if(m.sa===""||m.sb==="")return null;return +m.sa>+m.sb?m.b:m.a;}
function same(x,y){return (x&&y&&x.id===y.id)||(!x&&!y);}
function advance(br){
  let cur=br.rounds[0],ri=1;
  while(cur.length>1){const need=cur.length/2;
    if(!br.rounds[ri])br.rounds[ri]=Array.from({length:need},()=>({a:null,b:null,sa:"",sb:""}));
    const next=br.rounds[ri];
    for(let i=0;i<need;i++){const w1=bWin(cur[2*i]),w2=bWin(cur[2*i+1]),m=next[i];
      const ch=!same(m.a,w1)||!same(m.b,w2);m.a=w1;m.b=w2;if(ch){m.sa="";m.sb="";}}
    cur=next;ri++;}
  br.rounds.length=ri;
}

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function duplicateTournament(id){const t=DB.tournaments.find(x=>x.id===id);if(!t)return;const copy=JSON.parse(JSON.stringify(t));copy.id=uid();copy.name=t.name+" (copie)";copy.state.config.name=copy.name;copy.createdAt=Date.now();copy.updatedAt=Date.now();DB.tournaments.push(copy);toast("Tournoi dupliqué");persist();render();}
function saveMeta(id){const t=DB.tournaments.find(x=>x.id===id);if(!t)return;t.name=(document.getElementById("ed_name").value||"").trim()||t.name;t.date=(document.getElementById("ed_date").value||"").trim();t.location=(document.getElementById("ed_loc").value||"").trim();t.state.config.name=t.name;editId=null;persist();render();}

/* ===================== RESET LOGIC ===================== */
function resetFrom(stage){ // 'draw'|'split'|'finals'
  const o=["draw","split","finals"], i=o.indexOf(stage);
  if(i<=0)S.qualif.pools=null;
  if(i<=1){S.haute.pools=null;S.basse.pools=null;}
  S.finals={haute:null,basse:null};
}

/* ===================== 1. RÉGLAGES ===================== */

  return head("Étape 1","Réglages du tournoi","Choisis la taille de poule de référence : l'app calcule automatiquement la meilleure répartition possible (poules de 4 ou 5 en priorité), en respectant ton format et le nombre de terrains.")+
  `<div class="card">
    <div class="grid cols-2">
      <div><label class="fld">Nom du tournoi</label><input type="text" value="${esc(c.name)}" oninput="S.config.name=this.value;if(cur())cur().name=this.value;save()"></div>
      <div><label class="fld">Équipes par poule (référence)</label><input type="number" min="3" max="5" value="${c.poolSizeTarget}" onchange="S.config.poolSizeTarget=Math.max(3,Math.min(5,parseInt(this.value)||5));resetFrom('draw');render()"></div>
      <div><label class="fld">Qualifiés en Tableau Haut / poule</label><input type="number" min="1" max="4" value="${c.qualifPerPool}" onchange="S.config.qualifPerPool=Math.max(1,Math.min(4,parseInt(this.value)||3));resetFrom('draw');render()"></div>
      <div><label class="fld">Équipes pour le tournoi de démo</label><input type="number" min="6" max="200" value="${c.demoTeams}" onchange="S.config.demoTeams=Math.max(6,Math.min(200,parseInt(this.value)||40))"></div>
    </div>
    <div class="row" style="margin-top:18px">
      <div><label class="fld">Format des matchs</label>
        <div class="seg"><button class="${c.points===21?'on':''}" onclick="S.config.points=21;render()">21 points</button><button class="${c.points===25?'on':''}" onclick="S.config.points=25;render()">25 points</button></div></div>
    </div>
    <div class="row" style="margin-top:14px">
      <span class="pill">référence : poules de ${c.poolSizeTarget}</span>
      <span class="pill">${c.qualifPerPool} montent · taille min. ${minSize()}</span>
      <span class="pill ${has6?'warn':'ok'}">${previewN} éq. → ${nP} poules : ${sizes.join(' / ')}</span>
    </div>
    ${tgtBad?`<div class="note" style="background:#FAE9DF;border-color:#E8C3B0;color:#8a3d22"><b>Attention :</b> une poule doit compter strictement plus d'équipes que de qualifiés. Avec ${c.qualifPerPool} qualifiés, la taille minimale est ${minSize()} — la référence sera relevée automatiquement.</div>`:""}
    <div class="note"><b>Règle de répartition :</b> 1) respecter ta taille de référence ; 2) respecter les terrains (rotations) ; 3) n'oublier aucune équipe ; 4) éviter les poules de 6 ; 5) sinon adapter en 3/4/5. Les poules de 3 ne sont autorisées que si la taille minimale (${minSize()}) le permet. Classement au <b>coefficient = points pour ÷ points contre</b>, les <b>${c.qualifPerPool} premiers</b> montent en Tableau Haut.</div>
  </div>
  ${courtsConfigCard()}
  <div class="card"><div class="spread"><div><h3 class="sec" style="margin:0">Pour démarrer</h3><p class="muted tiny" style="margin:4px 0 0">Saisis tes équipes, ou génère un tournoi de démo (${c.demoTeams} équipes) pour tout tester.</p></div>
    <div class="row"><button class="btn sea" onclick="generateDemo()">⚡ Démo</button><button class="btn primary" onclick="go('teams')">Ajouter les équipes →</button></div></div></div>`;
}
function courtsConfigCard(){
  const c=S.config;ensureCourts();
  const previewN=S.teams.length||c.demoTeams, nP=bestSizes(previewN).length;
  const rows=c.courtNames.map((nm,i)=>`<div class="court-edit ${isCentral(i)?'central':''}">
     <span class="cb ${isCentral(i)?'central':''}">${i+1}</span>
     <input type="text" value="${esc(nm)}" oninput="S.config.courtNames[${i}]=this.value;save()" placeholder="Terrain ${i+1}">

/* ===================== 2. ÉQUIPES ===================== */

function addTeam(){const el=document.getElementById("newTeam"),v=el.value.trim();if(!v)return;S.teams.push({id:uid(),name:v,seed:false});el.value="";resetFrom('draw');render();document.getElementById("newTeam").focus();}
function removeTeam(id){S.teams=S.teams.filter(t=>t.id!==id);resetFrom('draw');render();}
function toggleSeed(id){const t=teamById(id);t.seed=!t.seed;resetFrom('draw');render();}
function seedFirst(){const k=bestSizes(S.teams.length).length;S.teams.forEach((t,i)=>t.seed=i<k);resetFrom('draw');render();}

/* ===================== 3. TIRAGE ===================== */
function drawPools(){
  const seeds=S.teams.filter(t=>t.seed).map(t=>t.id);
  const others=shuffle(S.teams.filter(t=>!t.seed).map(t=>t.id));
  S.qualif.pools=makePoolsSized(seeds,others,bestSizes(S.teams.length));
  resetFrom('split');
}
function pageDraw(){
  const need=minSize()*2;
  if(S.teams.length<need)return head("Étape 3","Tirage des poules","")+emptyState("⤮","Pas assez d'équipes",`Il faut au moins ${need} équipes (pour former au moins 2 poules). Tu en as ${S.teams.length}.`,`<button class="btn primary" style="margin-top:14px" onclick="go('teams')">Gérer les équipes</button>`);
  if(!S.qualif.pools)return head("Étape 3","Tirage des poules","Têtes de série en tête de chaque poule, puis tirage serpentin équilibré.")+emptyState("⤮","Lance le tirage",`${S.teams.length} équipes → ${bestSizes(S.teams.length).length} poules (${bestSizes(S.teams.length).join('/')}).`,`<button class="btn primary" style="margin-top:14px" onclick="drawPools();render()">⤮ Tirer les poules</button>`);
  return head("Étape 3","Tirage des poules","Relance le tirage ou échange une équipe via son menu. Le terrain de chaque poule est indiqué.")+
  `<div class="spread" style="margin-bottom:16px"><span class="muted tiny">${S.qualif.pools.length} poules · têtes de série ⭐</span><button class="btn" onclick="if(confirm('Relancer ? Les scores seront effacés.'))drawPools()||render()">↻ Relancer le tirage</button></div>
   <div class="pool-grid">${S.qualif.pools.map((p,idx)=>poolCardDraw(idx)).join("")}</div>
   <div class="card" style="margin-top:18px"><div class="spread"><span class="muted tiny">Poules ok ? Place à la saisie des scores.</span><button class="btn primary" onclick="go('pools')">Saisir les scores →</button></div></div>`;
}
function poolCardDraw(idx){
  const p=S.qualif.pools[idx],L=plabel(idx),{court,rotation}=poolCourt(idx);

   <div class="pool-body">${p.teams.map((id,pos)=>{const t=teamById(id);return `<div class="team-chip ${t&&t.seed?'seed':''}" style="margin:6px 0"><span class="idx">${pos+1}</span><span class="nm">${esc(teamName(id))}</span>
     <select class="seed-btn" style="width:auto;padding:3px" onchange="swapTeam(${idx},${pos},this.value)"><option value="">↔</option>${allSlots().filter(s=>!(s.pi===idx&&s.pos===pos)).map(s=>`<option value="${s.pi}|${s.pos}">→ ${plabel(s.pi)}${s.pos+1}: ${esc(teamName(s.id)).slice(0,14)}</option>`).join("")}</select></div>`}).join("")}</div></div>`;
}
function allSlots(){const r=[];S.qualif.pools.forEach((p,pi)=>p.teams.forEach((id,pos)=>r.push({pi,pos,id})));return r;}
function swapTeam(pi,pos,val){if(!val){render();return;}const[p2,o2]=val.split("|").map(Number);const a=S.qualif.pools[pi].teams[pos];S.qualif.pools[pi].teams[pos]=S.qualif.pools[p2].teams[o2];S.qualif.pools[p2].teams[o2]=a;resetFrom('split');render();}

      <div class="rotation"><div class="rh"><span>Rotation ${rot}</span><span class="muted">${byRot[rot].length} poule(s)</span></div>

    combined.forEach(o=>{const{court,rotation}=poolCourt(o.idx);(byRot[rotation]=byRot[rotation]||[]).push({...o,court});});

  } else aft=`<p class="muted tiny">L'après-midi s'affiche une fois les poules Hautes/Basses générées.</p>`;
  const finalsNote=c.centralIndex>=0?`Les finales et, en priorité, les demi-finales sont programmées sur le terrain central <b>${esc(courtName(c.centralIndex))}</b>.`:`Aucun terrain central défini (Réglages) : les grands matchs sont répartis sur l'ensemble des terrains.`;
  return head("Logistique","Affectation des terrains",`1 terrain = 1 poule. ${c.courts} terrain(s) fixés pour toute la journée — l'app ne lance jamais plus de ${c.courts} poules en même temps et crée des rotations si besoin.`)+
   `<div class="card"><h3 class="sec">Matin — poules de qualification</h3>${qual}</div>
    <div class="card"><h3 class="sec">Après-midi — Tableau Haut & Consolante</h3>${aft}</div>

/* ===================== POOL CARD (réutilisable) ===================== */
function poolCard(phase,idx,L,sea){
  const store=phaseStore(phase),pool=store.pools[idx],st=poolStandings(pool);
  const qpp=S.config.qualifPerPool;
  const courtInfo=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx);
  const rows=pool.matches.map((m,mi)=>{
    const id1=pool.teams[m.i],id2=pool.teams[m.j],ref=m.ref>=0?pool.teams[m.ref]:null;
    const s=pool.scores[mi]||["",""];
    const w1=s[0]!==""&&s[1]!==""&&+s[0]>+s[1],w2=s[0]!==""&&s[1]!==""&&+s[1]>+s[0];
    return `<div class="match"><span class="mno">${mi+1}</span>
      <span class="nm1 ${w1?'win':''}" title="${esc(teamName(id1))}">${esc(teamName(id1))}</span>
      <input type="number" min="0" value="${s[0]}" onchange="setScore('${phase}',${idx},${mi},0,this.value)">
      <span class="vs">—</span>
      <input type="number" min="0" value="${s[1]}" onchange="setScore('${phase}',${idx},${mi},1,this.value)">
      <span class="nm2 ${w2?'win':''}" title="${esc(teamName(id2))}">${esc(teamName(id2))}</span></div>
      <div class="ref">${ref?`arbitre : <b>${esc(teamName(ref))}</b>`:'&nbsp;'}</div>`;
  }).join("");
  const tbl=`<table class="standtbl"><thead><tr><th></th><th style="text-align:left">Équipe</th><th>V</th><th>Pour</th><th>Con</th><th>Coeff</th></tr></thead><tbody>${st.ordered.map((x)=>{
    const up = phase==="qualif" && x.rank>0 && x.rank<=qpp;
    return `<tr class="${x.rank===1?'r1':''} ${up&&x.rank!==1?'q':''} ${up?'qd':''}"><td><span class="rk">${x.rank||'-'}</span></td><td class="nm">${esc(teamName(x.id))}</td><td>${x.w}</td><td>${x.pf}</td><td>${x.pc}</td><td style="font-weight:700">${fmtCoeff(x.coeff)}</td></tr>`;
  }).join("")}</tbody></table>`;
  return `<div class="pool"><div class="pool-h ${sea?'sea':''}"><div class="t"><span class="badge">${L}</span>Poule ${L}</div>${courtInfo?`<span class="court-tag" title="${esc(courtName(courtInfo.court-1))}">${esc(courtName(courtInfo.court-1))}${courtInfo.rotation>1?'·r'+courtInfo.rotation:''}</span>`:(st.complete?'<span class="court-tag">fini</span>':'')}</div>
   <div class="pool-body">${rows}<div style="height:4px"></div>${tbl}</div></div>`;
}
function phaseStore(phase){return phase==="qualif"?S.qualif:phase==="haute"?S.haute:S.basse;}
function setScore(phase,idx,mi,side,val){
  const pool=phaseStore(phase).pools[idx];
  pool.scores[mi][side]=val===""?"":(+val);
  if(phase==="qualif")resetFrom('split');else resetFrom('finals');
  render();
}

/* ===================== 5. POULES QUALIF ===================== */
function pagePools(){
  if(!S.qualif.pools)return head("Étape 4","Poules de qualification","")+emptyState("▦","Pas encore de poules","Lance d'abord le tirage.",`<button class="btn primary" style="margin-top:14px" onclick="go('draw')">Aller au tirage</button>`);
  let done=S.qualif.pools.filter(p=>poolStandings(p).complete).length;
  const tot=S.qualif.pools.length;
  return head("Étape 4","Poules de qualification",`Round-robin : chaque équipe affronte toutes les autres de sa poule. Matchs en ${S.config.points} points. Classement automatique au coefficient. Les ${S.config.qualifPerPool} premiers (surlignés) montent en Tableau Haut.`)+
   journalQualif()+
   `<div class="spread" style="margin-bottom:16px"><span class="pill ${done===tot?'ok':''}">${done}/${tot} poules terminées</span><button class="btn sm" onclick="go('split')">Qualification H/B →</button></div>
    <div class="pool-grid">${S.qualif.pools.map((p,idx)=>poolCard("qualif",idx,plabel(idx),false)).join("")}</div>`;
}

/* ===================== 6. QUALIFICATION H/B ===================== */
function qualifComplete(){return S.qualif.pools&&S.qualif.pools.every(p=>poolStandings(p).complete);}
function buildHB(){
  const qpp=S.config.qualifPerPool;let haut=[],cons=[];
  S.qualif.pools.forEach(p=>poolStandings(p).ordered.forEach((e,idx)=>{
    const r={id:e.id,coeff:e.coeff===Infinity?9999:e.coeff,pos:idx+1};(idx<qpp?haut:cons).push(r);}));
  cons.sort((a,b)=>a.pos-b.pos||b.coeff-a.coeff); // ordre de repêchage : meilleurs non-qualifiés d'abord
  // repêchage minimal (Bas→Haut uniquement) pour que les deux tableaux tiennent en poules de 4/5
  let promo=0;
  for(let p=0;p<=cons.length;p++){const nb=haut.length+p,nc=cons.length-p;
    if(feasibleClean(nb)&&(nc===0||feasibleClean(nc))){promo=p;break;}}
  const repsUp=cons.slice(0,promo), hautAll=haut.concat(repsUp), consRest=cons.slice(promo);
  const co=morningCoPool();
  const hRes=buildAfternoonPools(hautAll,bestSizes(hautAll.length),co);
  const bRes=buildAfternoonPools(consRest,bestSizes(consRest.length),co);
  S.haute.pools=hRes.poolIds.map(ids=>buildPool(ids));
  S.basse.pools=bRes.poolIds.map(ids=>buildPool(ids));
  S._repeche={count:promo,ids:repsUp.map(r=>r.id)};
  S._afternoon={haute:{reMatch:hRes.reMatch},basse:{reMatch:bRes.reMatch}};
  S.finals={haute:null,basse:null};
}
function pageSplit(){
  if(!S.qualif.pools)return head("Étape 5","Qualification Haute / Basse","")+emptyState("⇅","Poules non créées","Fais le tirage et la saisie d'abord.","");
  const complete=qualifComplete();
  let body;
  if(!S.haute.pools){
    body=emptyState("⇅",complete?"Qualification prête":"Termine d'abord les poules",
      complete?`Tous les matchs de qualif sont saisis. Génère les nouvelles poules du Tableau Haut et du Tableau Bas.`:`Saisis tous les scores des poules de qualif pour pouvoir qualifier.`,
      complete?`<button class="btn primary" style="margin-top:14px" onclick="buildHB();render()">⇅ Générer Tableau Haut & Tableau Bas</button>`:`<button class="btn" style="margin-top:14px" onclick="go('pools')">Saisir les scores</button>`);
  } else {
    const list=(store,pfx,sea)=>store.pools.map((p,i)=>`<div class="pool"><div class="pool-h ${sea?'sea':''}"><div class="t"><span class="badge">${pfx}${i+1}</span>Poule ${pfx}${i+1}</div><span class="court-tag">${p.teams.length} éq.</span></div><div class="pool-body">${p.teams.map((id,pos)=>`<div class="team-chip" style="margin:6px 0"><span class="idx">${pos+1}</span><span class="nm">${esc(teamName(id))}</span></div>`).join("")}</div></div>`).join("");
    const hc=S.haute.pools.reduce((a,p)=>a+p.teams.length,0),bc=S.basse.pools.reduce((a,p)=>a+p.teams.length,0);
    const hsizes=S.haute.pools.map(p=>p.teams.length).join("/"), bsizes=S.basse.pools.map(p=>p.teams.length).join("/")||"—";
    body=`${journalHB()}<div class="spread" style="margin-bottom:10px"><span class="muted tiny">Les ${S.config.qualifPerPool} premiers de chaque poule de qualif → <b>Tableau Haut</b> (${hc} éq.), le reste → <b>Tableau Bas / consolante</b> (${bc} éq.). Poules de 4 ou 5 uniquement.</span><button class="btn sm" onclick="if(confirm('Régénérer ? Le placement et les scores H/B seront refaits.'))buildHB()||render()">↻ Régénérer</button></div>
      <h3 class="sec" style="color:var(--coral)">▲ Tableau Haut — ${S.haute.pools.length} poules (${hsizes})</h3><div class="pool-grid">${list(S.haute,"H",false)}</div>
      <h3 class="sec" style="color:var(--sea);margin-top:26px">▼ Tableau Bas (consolante) — ${S.basse.pools.length} poules (${bsizes})</h3><div class="pool-grid">${list(S.basse,"C",true)}</div>
      <div class="card" style="margin-top:18px"><div class="spread"><span class="muted tiny">Place aux poules de l'après-midi.</span><button class="btn primary" onclick="go('hb')">Saisir les poules H & B →</button></div></div>`;
  }
  return head("Étape 5","Qualification Haute / Basse","Répartition des qualifiés en deux tableaux après les poules du matin.")+body;
}

/* ===================== 7. POULES H & B ===================== */
function pageHB(){
  if(!S.haute.pools)return head("Étape 6","Poules Hautes & Basses","")+emptyState("▥","Pas encore qualifiées","Génère d'abord la répartition H/B.",`<button class="btn primary" style="margin-top:14px" onclick="go('split')">Qualification H/B</button>`);
  return head("Étape 6","Poules Hautes & Basses",`Deuxième phase de qualification. Mêmes règles. Les mieux classés se qualifient pour les tableaux finaux.`)+
   journalHB()+
   `<h3 class="sec" style="color:var(--coral)">▲ Tableau Haut</h3><div class="pool-grid">${S.haute.pools.map((p,idx)=>poolCard("haute",idx,"H"+(idx+1),false)).join("")}</div>
    <h3 class="sec" style="color:var(--sea);margin-top:28px">▼ Tableau Bas (consolante)</h3><div class="pool-grid">${S.basse.pools.map((p,idx)=>poolCard("basse",idx,"C"+(idx+1),true)).join("")}</div>
    <div class="card" style="margin-top:18px"><div class="spread"><span class="muted tiny">Poules finies ? Place aux phases finales.</span><button class="btn primary" onclick="go('finals')">Phases finales →</button></div></div>`;
}

/* ===================== 8. PHASES FINALES ===================== */
function hbComplete(store){return store.pools&&store.pools.every(p=>poolStandings(p).complete);}
function ensureFinals(fill){
  if(hbComplete(S.haute)&&!S.finals.haute)S.finals.haute=makeBracket(rankAllFromPools(S.haute.pools));
  if(hbComplete(S.basse)&&!S.finals.basse)S.finals.basse=makeBracket(rankAllFromPools(S.basse.pools));
  if(fill){fillBracket(S.finals.haute);fillBracket(S.finals.basse);}
}
function fillBracket(br){
  if(!br)return; advance(br);
  for(let ri=0;ri<br.rounds.length;ri++){br.rounds[ri].forEach(m=>{if(m.a&&m.b){const[a,b]=randScore();m.sa=a;m.sb=b;}});advance(br);}
  const total=br.rounds.length;
  if(total>=2){const semis=br.rounds[total-2],l1=bLose(semis[0]),l2=semis[1]?bLose(semis[1]):null;
    br.extra.petite.a=l1;br.extra.petite.b=l2;if(l1&&l2){const[a,b]=randScore();br.extra.petite.sa=a;br.extra.petite.sb=b;}}
}
function roundName(remaining){return {1:"Finale",2:"Demi-finales",3:"Quarts de finale",4:"8es de finale",5:"16es de finale",6:"32es de finale"}[remaining]||("Tour");}
function pageFinals(){
  ensureFinals(false);
  const tab=(k,lbl,col)=>`<button class="${finalTab===k?'active':''}" style="${finalTab===k?'background:'+col+';border-color:'+col:''}" onclick="finalTab='${k}';render()">${lbl}</button>`;
  const store=finalTab==="haute"?S.haute:S.basse,br=S.finals[finalTab];
  let body;
  if(!hbComplete(store))body=emptyState("♛","Termine les poules "+(finalTab==="haute"?"Hautes":"Basses"),"Tous les matchs de poules doivent être saisis pour générer le tableau.",`<button class="btn" style="margin-top:14px" onclick="go('hb')">Saisir les poules</button>`);
  else if(!br||br.size<2)body=emptyState("♛","Pas assez de qualifiés","Il faut au moins 2 équipes qualifiées pour un tableau.","");
  else body=renderBracket(finalTab);
  return head("Étape 7","Phases finales",`Tableaux à élimination directe générés automatiquement selon le nombre de qualifiés (4, 8, 16, 32…). Saisis les scores : les vainqueurs avancent seuls.`)+
    journalFinals()+
    `<div class="bracket-tabs">${tab("haute","▲ Tableau principal","var(--coral)")}${tab("basse","▼ Consolante","var(--sea)")}</div>${body}`;
}
function courtBadge(matchSeq,isBig){
  const c=S.config;
  if(isBig&&c.centralIndex>=0)return `<span class="ct central" title="${esc(courtName(c.centralIndex))}">${esc(courtName(c.centralIndex))}</span>`;
  const i=matchSeq%Math.max(1,c.courts);
  return `<span class="ct" title="${esc(courtName(i))}">${esc(courtName(i))}</span>`;
}
function renderBracket(side){
  const br=S.finals[side];advance(br);
  const total=br.rounds.length,consol=side==="basse"?"consol":"";
  let seq=0;
  const cols=br.rounds.map((rd,ri)=>{
    const remaining=total-ri,big=remaining<=2;
    return `<div class="round ${consol}"><h4>${roundName(remaining)}</h4>${rd.map((m,mi)=>bmatchHTML(side,ri,mi,m,ri===0,courtBadge(seq++,big))).join("")}</div>`;
  }).join("");
  let petite="";
  if(total>=2){
    const semis=br.rounds[total-2],l1=bLose(semis[0]),l2=semis[1]?bLose(semis[1]):null;
    br.extra=br.extra||{petite:{sa:"",sb:""}};const pm=br.extra.petite;
    if(!same(pm.a,l1)||!same(pm.b,l2)){pm.a=l1;pm.b=l2;pm.sa="";pm.sb="";}
    petite=`<div class="round ${consol}"><h4>Petite finale (3e place)</h4>${bmatchHTML(side,"P",0,pm,false,courtBadge(seq++,true))}</div>`;
  }
  const champ=bWin(br.rounds[total-1][0]);
  return `${champ?`<div class="card" style="margin-bottom:16px;background:#FBF6E6;border-color:#EBDFB8"><div class="row"><span style="font-size:24px">🏆</span><div><div class="eyebrow" style="color:var(--gold)">Vainqueur ${side==='haute'?'Tableau principal':'Consolante'}</div><div style="font-size:20px;font-weight:800">${esc(teamName(champ.id))}</div></div></div></div>`:""}
   <div class="rounds">${cols}${petite}</div>`;
}
function bmatchHTML(side,ri,mi,m,editable,courtTag){
  const w=bWin(m);
  const teamRow=(t,score,which)=>{
    const isW=w&&t&&w.id===t.id, disabled=(!t||!m.a||!m.b)&&!editable&&ri!=="P";
    return `<div class="bteam ${isW?'win':''}"><span class="bn">${t?`${t.seed?`<span class="seedtag">#${t.seed}</span>`:""}${esc(teamName(t.id))}`:'<span style="color:#c9c0ae">—</span>'}</span><input type="number" min="0" value="${score}" ${disabled?'disabled':''} onchange="setBracket('${side}','${ri}',${mi},'${which}',this.value)"></div>`;
  };
  return `<div class="bmatch">${courtTag}${teamRow(m.a,m.sa,"sa")}${teamRow(m.b,m.sb,"sb")}</div>`;
}
function setBracket(side,ri,mi,which,val){
  const br=S.finals[side],m=ri==="P"?br.extra.petite:br.rounds[+ri][mi];
  m[which]=val===""?"":(+val);render();
}

/* ===================== 9. CLASSEMENT FINAL ===================== */
function pageFinal(){
  ensureFinals(false);
  const block=(side,title,col)=>{
    const br=S.finals[side];
    if(!br||br.size<2)return `<div class="card"><h3 class="sec" style="color:${col}">${title}</h3><p class="muted tiny">Tableau non disponible.</p></div>`;
    advance(br);const total=br.rounds.length,fin=br.rounds[total-1][0];
    const champ=bWin(fin),vice=bLose(fin),pm=br.extra&&br.extra.petite;
    const third=pm?bWin(pm):null,fourth=pm?bLose(pm):null;
    const rows=[["1er",champ],["2e",vice],["3e",third],["4e",fourth]].filter(r=>r[1]).map(r=>`<li><span class="pos">${r[0]}</span><span class="who">${esc(teamName(r[1].id))}</span></li>`).join("");
    return `<div class="card"><h3 class="sec" style="color:${col}">${title}</h3>${rows?`<ul class="rank-list">${rows}</ul>`:'<p class="muted tiny">Termine les phases finales pour voir le podium.</p>'}</div>`;
  };
  return head("Résultats","Classement final","Podiums des deux tableaux, calculés à partir des scores saisis.")+
    `<div class="podium">${block("haute","🏆 Tableau principal","var(--coral)")}${block("basse","🥈 Consolante","var(--sea)")}</div>
     <div class="note" style="margin-top:18px"><b>Sauvegarde :</b> tout est enregistré dans le navigateur. Exporte en .json pour conserver ou partager le tournoi, et rouvre-le sur tablette le jour J.</div>`;
}

/* ===================== DÉMO / RESET ===================== */
function generateDemo(){
  if(S.teams.length&&!confirm("Remplacer le tournoi actuel par un tournoi de démonstration ?"))return;
  const total=Math.max(minSize()*2,S.config.demoTeams||40);
  const sizes=bestSizes(total), nSeeds=sizes.length;
  S.teams=[];for(let i=1;i<=total;i++)S.teams.push({id:uid(),name:"Équipe "+i,seed:i<=nSeeds});
  drawPools();
  S.qualif.pools.forEach(p=>p.scores=p.matches.map(()=>randScore()));
  buildHB();
  S.haute.pools.forEach(p=>p.scores=p.matches.map(()=>randScore()));
  S.basse.pools.forEach(p=>p.scores=p.matches.map(()=>randScore()));
  S.finals={haute:null,basse:null};ensureFinals(true);
  toast("Tournoi de démonstration généré");go("final");
}
function emptyTournament(){
  if(!confirm("Repartir d'un tournoi vide ? (équipes et scores effacés, réglages conservés)"))return;
  S.teams=[];S.qualif.pools=null;S.haute.pools=null;S.basse.pools=null;S.finals={haute:null,basse:null};
  route="teams";toast("Tournoi vidé");render();
}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._);t._=setTimeout(()=>t.classList.remove("show"),1900);}
function exportJSON(){const t=cur();if(!t)return;const out={cap_tournoi:1,name:t.name,date:t.date,location:t.location,state:t.state};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(t.name||"tournoi").replace(/[^\w\-]+/g,"_")+".json";a.click();toast("Tournoi exporté");}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);let t;
    if(data&&data.cap_tournoi&&data.state){t={id:uid(),name:data.name||"Tournoi importé",date:data.date||"",location:data.location||"",createdAt:Date.now(),updatedAt:Date.now(),state:data.state};}
    else if(data&&data.config&&data.teams){t={id:uid(),name:(data.config.name||"Tournoi importé"),date:"",location:"",createdAt:Date.now(),updatedAt:Date.now(),state:data};} // ancien format (état seul)
    else if(data&&Array.isArray(data.tournaments)){data.tournaments.forEach(x=>{x.id=uid();DB.tournaments.push(x);});persist();render();toast("Tournois importés");return;}
    else throw new Error("format");
    DB.tournaments.push(t);currentId=null;persist();render();toast("Tournoi importé");
  }catch(err){alert("Fichier invalide.");}};
  r.readAsText(f);e.target.value="";}

render();
</script>
</body>
