<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cap Homard — Gestion de Tournoi Beach Volley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#FAFAFA;--sand-2:#F4F4F5;--ink:#18181B;--ink-soft:#71717A;
  --line:#E4E4E7;--card:#FFFFFF;
  --coral:#DC2626;--coral-d:#B91C1C;
  --sea:#1E40AF;--sea-d:#1E3A8A;--gold:#F59E0B;
  --blue:#1E40AF;--yellow:#F59E0B;--red:#DC2626;
  --ok:#16A34A;--bad:#DC2626;
  --shadow-soft:0 1px 2px rgba(24,24,27,.04),0 6px 20px rgba(24,24,27,.05);
  --shadow-card:0 1px 3px rgba(24,24,27,.05),0 12px 32px rgba(24,24,27,.07);
  --shadow-lift:0 16px 48px rgba(24,24,27,.14);
  --shadow-premium:0 24px 70px rgba(24,24,27,.20);
  --shadow:var(--shadow-soft);--radius:18px;
  --font-display:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
  --font-body:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--sand);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit}::selection{background:var(--coral);color:#fff}
.app{display:flex;min-height:100vh}
.sidebar{width:252px;flex:none;background:var(--ink);color:#EDE7DA;padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand .ball{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 32% 30%,#fff 0 22%,var(--coral) 23% 55%,var(--sea) 56%);box-shadow:0 0 0 2px rgba(255,255,255,.1)}
.brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
.brand small{display:block;color:#9c958a;font-size:11px;font-weight:500}
.tname{font-size:12px;color:#b8b0a2;margin:14px 4px 16px;border-top:1px solid #34322e;padding-top:14px;word-break:break-word}
nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#cdc6b8;text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:2px;transition:.12s}
nav a .n{width:20px;height:20px;border-radius:6px;background:#34322e;display:grid;place-items:center;font-size:11px;color:#9c958a;flex:none}
nav a:hover{background:#2a2925;color:#fff}nav a.active{background:var(--coral);color:#fff}
nav a.active .n{background:rgba(255,255,255,.22);color:#fff}
.side-foot{margin-top:16px;border-top:1px solid #34322e;padding-top:14px;display:flex;flex-direction:column;gap:8px}
.side-foot button{width:100%;text-align:left;background:#2a2925;border:1px solid #3a3833;color:#cdc6b8;padding:8px 11px;border-radius:9px;font-size:12.5px;cursor:pointer;display:flex;gap:8px;align-items:center}
.side-foot button:hover{background:#34322e;color:#fff}
.side-foot button.demo{background:var(--sea);border-color:var(--sea);color:#fff}
.side-foot button.demo:hover{background:var(--sea-d)}
.side-foot button.danger:hover{background:var(--bad);border-color:var(--bad);color:#fff}
main{flex:1;min-width:0}.wrap{max-width:1120px;margin:0 auto;padding:34px 34px 90px}
.page-head{margin-bottom:22px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--coral)}
.page-head h2{font-size:27px;margin:6px 0 4px;font-weight:760;letter-spacing:-.4px}
.page-head p{margin:0;color:var(--ink-soft);font-size:14px;max-width:66ch}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.card+.card{margin-top:18px}
.grid{display:grid;gap:16px}.cols-2{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}
h3.sec{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);margin:0 0 14px;font-weight:700}
.muted{color:var(--ink-soft)}.tiny{font-size:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:#cbbfa9;background:#fdfbf6}
.btn.primary{background:var(--coral);border-color:var(--coral);color:#fff}.btn.primary:hover{background:var(--coral-d);border-color:var(--coral-d)}
.btn.sea{background:var(--sea);border-color:var(--sea);color:#fff}.btn.sea:hover{background:var(--sea-d)}
.btn.ghost{background:transparent}.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
input[type=text],input[type=number],select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);outline:none;transition:.12s;width:100%}
input:focus,select:focus{border-color:var(--coral);box-shadow:0 0 0 3px rgba(232,100,60,.12)}
label.fld{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{padding:9px 16px;border:none;background:#fff;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--ink-soft)}
.seg button.on{background:var(--ink);color:#fff}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13.5px;font-weight:600}
.switch input{display:none}.switch .tg{width:40px;height:23px;border-radius:99px;background:var(--sand-2);position:relative;transition:.15s;border:1px solid var(--line)}
.switch .tg::after{content:"";position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked+.tg{background:var(--sea);border-color:var(--sea)}.switch input:checked+.tg::after{left:20px}
.team-input{display:flex;gap:10px;margin-bottom:16px}
.team-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:720px){.team-list{grid-template-columns:1fr}}
.team-chip{display:flex;align-items:center;gap:10px;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13.5px}
.team-chip .idx{width:22px;height:22px;border-radius:6px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:11px;color:var(--ink-soft);flex:none;font-weight:700}
.team-chip.seed{border-color:var(--gold);background:#FBF6E6}
.team-chip .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-chip .x{cursor:pointer;color:var(--ink-soft);border:none;background:none;font-size:16px;padding:2px 6px;border-radius:6px}
.team-chip .x:hover{background:#fff;color:var(--bad)}
.seed-btn{border:1px solid var(--line);background:#fff;border-radius:6px;font-size:11px;padding:3px 7px;cursor:pointer;font-weight:700;color:var(--ink-soft)}
.seed-btn.on{background:var(--gold);border-color:var(--gold);color:#fff}
.counter{font-size:13px;font-weight:600}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:700;background:var(--sand-2);color:var(--ink-soft)}
.pill.ok{background:#E2F0E6;color:var(--ok)}.pill.warn{background:#FAE9DF;color:var(--coral-d)}
.pill.court{background:#E2EFEF;color:var(--sea-d)}
.pool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.pool{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.pool-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--ink);color:#fff}
.pool-h .t{font-weight:700;font-size:14px;display:flex;gap:9px;align-items:center}
.pool-h .badge{width:24px;height:24px;border-radius:7px;background:var(--coral);display:grid;place-items:center;font-size:12px;font-weight:800}
.pool-h.sea .badge{background:var(--sea)}
.pool-h .court-tag{font-size:10px;font-weight:700;background:rgba(255,255,255,.16);padding:2px 7px;border-radius:99px}
.pool-body{padding:6px 12px 12px}
.standtbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.standtbl th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);font-weight:700;text-align:center;padding:6px 4px;border-bottom:1px solid var(--line)}
.standtbl td{padding:7px 4px;border-bottom:1px solid #f0eadd;text-align:center}
.standtbl td.nm{text-align:left;font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.standtbl tr.q td{background:#EAF4ED}.standtbl tr.r1 td{background:#FBF6E6}
.standtbl .rk{width:20px;height:20px;border-radius:6px;display:inline-grid;place-items:center;font-size:11px;font-weight:800;background:var(--sand-2);color:var(--ink-soft)}
.standtbl tr.r1 .rk{background:var(--gold);color:#fff}
.standtbl tr.qd .rk{background:var(--sea);color:#fff}
.match{display:grid;grid-template-columns:18px 1fr 44px 12px 44px 1fr;gap:5px;align-items:center;padding:6px 0}
.match .mno{font-size:10px;color:var(--ink-soft);font-weight:800;text-align:center}
.match .nm1{text-align:right;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match .nm2{text-align:left;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match .vs{text-align:center;color:var(--ink-soft);font-size:10px}
.match input{padding:5px;text-align:center;font-weight:700;font-size:13px}
.match .win{color:var(--ok)}
.ref{font-size:10px;color:var(--ink-soft);text-align:center;padding:0 0 6px;border-bottom:1px solid #f2ecdf;margin-bottom:2px}
.ref b{color:var(--sea)}
.bracket-tabs{display:flex;gap:8px;margin-bottom:18px}
.bracket-tabs button{flex:1;padding:11px;border:1px solid var(--line);background:#fff;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer}
.bracket-tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.rounds{display:flex;gap:20px;overflow-x:auto;padding-bottom:14px}
.round{min-width:218px;flex:none}
.round h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--coral);margin:0 0 12px;font-weight:800}
.round.consol h4{color:var(--sea)}
.bmatch{background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:14px;box-shadow:var(--shadow);position:relative}
.bmatch .ct{position:absolute;top:-8px;right:8px;font-size:9px;font-weight:700;background:var(--sand-2);color:var(--ink-soft);padding:1px 6px;border-radius:99px;border:1px solid var(--line)}
.bmatch .ct.central{background:var(--gold);color:#fff;border-color:var(--gold)}
.bteam{display:grid;grid-template-columns:1fr 40px;gap:6px;align-items:center;padding:4px 0}
.bteam+.bteam{border-top:1px solid #f2ecdf}
.bteam .bn{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-soft)}
.bteam.win .bn{color:var(--ink);font-weight:800}.bteam.win .bn::after{content:" ▸";color:var(--gold)}
.bteam input{padding:4px;text-align:center;font-weight:700}
.bteam .seedtag{font-size:9px;color:#b3aa98;font-weight:700;margin-right:4px}
.podium{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:720px){.podium{grid-template-columns:1fr}}
.rank-list{list-style:none;margin:0;padding:0}
.rank-list li{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);font-size:14px}
.rank-list li:last-child{border:none}
.rank-list .pos{width:30px;height:30px;border-radius:9px;background:var(--sand-2);display:grid;place-items:center;font-weight:800;font-size:12px;flex:none}
.rank-list li:nth-child(1) .pos{background:var(--gold);color:#fff}
.rank-list li:nth-child(2) .pos{background:#C0C0C0;color:#fff}
.rank-list li:nth-child(3) .pos{background:#CD7F32;color:#fff}
.rank-list .who{font-weight:600}
/* courts planning */
.rotation{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
.rotation .rh{background:var(--sand-2);padding:9px 14px;font-weight:700;font-size:13px;display:flex;justify-content:space-between}
.court-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-top:1px solid var(--line);font-size:13.5px}
.court-row .cb{width:30px;height:30px;border-radius:8px;background:var(--sea);color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px;flex:none}
.court-row .cb.central{background:var(--gold)}
.empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
.empty .big{font-size:40px;margin-bottom:8px;opacity:.4}.empty h4{margin:0 0 6px;color:var(--ink);font-size:17px}
.note{background:#FBF6E6;border:1px solid #EBDFB8;border-radius:11px;padding:13px 15px;font-size:13px;color:#6b5d2e;margin-top:16px}
.note b{color:#4f450f}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:860px){
  .app{flex-direction:column}.sidebar{width:100%;height:auto;position:static;padding:14px}
  .sidebar nav{display:flex;overflow-x:auto;gap:4px;padding-bottom:4px}nav a{flex:none;white-space:nowrap}
  .brand,.tname{display:none}.side-foot{flex-direction:row;flex-wrap:wrap;margin-top:10px;border:none;padding-top:0}
  .side-foot button{width:auto}.wrap{padding:22px 16px 80px}.cols-2,.cols-3{grid-template-columns:1fr}
}
/* --- connexion --- */
.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;background:
  radial-gradient(1200px 600px at 50% -10%, #fff6ec 0, var(--sand) 60%)}
.auth-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 26px}
.auth-card .brand h1{font-size:18px}
.login-err{color:var(--bad);font-size:12.5px;font-weight:600;margin-top:10px;min-height:16px;text-align:center}
/* --- accueil --- */
.home{min-height:100vh}
.home-head{display:flex;justify-content:space-between;align-items:center;padding:18px 30px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:5}
.home-head .brand h1{color:#fff}.home-head .brand small{color:#9c958a}
.home-body{max-width:1000px;margin:0 auto;padding:28px 24px 80px}
.create-card{border:1px solid var(--line)}
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.t-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
.t-card.editing{border-color:var(--coral)}
.t-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.t-name{font-weight:760;font-size:16px;letter-spacing:-.2px}
.status{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--sand-2);color:var(--ink-soft);white-space:nowrap;flex:none}
.status.ok{background:#E2F0E6;color:var(--ok)}.status.muted2{background:#eee;color:#999}
.t-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.t-actions{display:flex;flex-wrap:wrap;gap:7px}
.danger-txt{color:var(--bad)}.danger-txt:hover{background:#fbeae8;border-color:var(--bad)}
/* --- sidebar additions --- */
.backbtn{width:100%;text-align:left;background:transparent;border:1px solid #3a3833;color:#cdc6b8;padding:7px 11px;border-radius:9px;font-size:12px;cursor:pointer;margin-bottom:12px}
.backbtn:hover{background:#2a2925;color:#fff}
.tname .tdate{display:block;color:#8a847a;font-size:11px;font-weight:500;margin-top:2px}
.pool-h.gold{background:linear-gradient(90deg,var(--gold),#b8920f)}
/* --- éditeur de terrains --- */
.court-edit-list{display:flex;flex-direction:column;gap:8px}
.court-edit{display:flex;align-items:center;gap:10px;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:7px 9px}
.court-edit.central{border-color:var(--gold);background:#FBF6E6}
.court-edit .cb{width:26px;height:26px;border-radius:7px;background:var(--sea);color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px;flex:none}
.court-edit .cb.central{background:var(--gold)}
.court-edit input{flex:1}
.court-row .cb.central{background:var(--gold)}
.court-row .arrow{color:var(--ink-soft)}
.court-row b{min-width:120px}
/* --- journal des décisions --- */
.journal{background:#F2F6F6;border:1px solid #CFE0E0;border-left:3px solid var(--sea);border-radius:11px;padding:13px 16px;margin-bottom:18px}
.journal .jh{font-size:11px;text-transform:uppercase;letter-spacing:.9px;font-weight:800;color:var(--sea-d);margin-bottom:8px}
.journal ul{margin:0;padding-left:18px}
.journal li{font-size:13px;color:#2f4a4a;margin:4px 0;line-height:1.5}
.journal li b{color:var(--ink)}
/* --- live & partage --- */
.qr-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:140px;background:var(--sand);border:1px dashed var(--line);border-radius:12px;padding:16px}
.qr-box{width:230px;max-width:70vw;background:#fff;padding:10px;border-radius:10px;box-shadow:var(--shadow)}
.qr-box svg{display:block;width:100%;height:auto}
#shareUrl{font-family:ui-monospace,monospace;color:var(--ink-soft)}
/* --- vue spectateur --- */
.spec{min-height:100vh;background:var(--sand);max-width:680px;margin:0 auto}
.spec-head{position:sticky;top:0;z-index:5;background:var(--ink);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.spec-head .brand h1{color:#fff;font-size:15px}.spec-head .brand small{color:#b8b0a2}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
.live-badge .dot{width:7px;height:7px;border-radius:50%;background:#ff5b5b;box-shadow:0 0 0 0 rgba(255,91,91,.6);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,91,91,.6)}70%{box-shadow:0 0 0 7px rgba(255,91,91,0)}100%{box-shadow:0 0 0 0 rgba(255,91,91,0)}}
.spec-tabs{position:sticky;top:52px;z-index:4;display:flex;background:#fff;border-bottom:1px solid var(--line)}
.spec-tabs button{flex:1;padding:12px 4px;border:none;background:none;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent}
.spec-tabs button.on{color:var(--coral);border-bottom-color:var(--coral)}
.spec-body{padding:14px}
.spec-body .card{padding:12px}
.spec-sec{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);font-weight:800;margin:18px 2px 8px}
.spec-sec.coral{color:var(--coral)}.spec-sec.sea{color:var(--sea)}
.spec-sec:first-child{margin-top:0}
.spec-pool-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.spec-pool-h .court{font-size:10.5px;font-weight:700;color:var(--sea-d);background:#E2EFEF;padding:2px 8px;border-radius:99px}
.spec-tbl{font-size:12px}.spec-tbl td{padding:6px 3px}.spec-tbl .cf{font-weight:700}
.spec-match{display:grid;grid-template-columns:1fr 64px 1fr;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f2ecdf;font-size:12.5px}
.spec-match:last-child{border:none}
.spec-match .t1{text-align:right}.spec-match .t2{text-align:left}
.spec-match .t1.w,.spec-match .t2.w{font-weight:800}
.spec-match .sc{text-align:center;font-weight:800;font-size:12px}
.spec-match.todo .sc{color:var(--ink-soft);font-weight:600}
.spec-match.done .sc{background:var(--sand-2);border-radius:6px;padding:2px 0}
.spec-rounds{gap:14px}.spec-rounds .round{min-width:160px}
.spec-rounds .bmatch{padding:6px 8px}.spec-rounds .bteam{display:flex;justify-content:space-between;gap:6px;padding:3px 0}
.spec-rounds .bteam+.bteam{border-top:1px solid #f2ecdf}
.spec-rounds .bteam .bn{font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spec-rounds .bteam.win .bn{color:var(--ink);font-weight:800}
.spec-rounds .bteam .bs{font-weight:700;font-size:12px}
.spec-foot{text-align:center;padding:20px;font-size:11px}.spec-foot a{color:var(--ink-soft);text-decoration:none}
/* statut */
.st-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:800;background:var(--sand-2);color:var(--ink-soft);white-space:nowrap}
.st-badge.ok{background:#E2F0E6;color:var(--ok)}
.st-badge.out{background:#F7E0DC;color:var(--bad)}
.st-badge.play{background:#E2EAF4;color:#2d5aa8}
.st-badge.sea{background:#E2EFEF;color:var(--sea-d)}
.st-badge.repe{background:#FBF6E6;color:#9a7d10}
.st-badge.gold{background:var(--gold);color:#fff}
.team-card .tc-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.team-card .tc-name{font-weight:800;font-size:16px}
.jstep{background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px}
.jstep-h{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px}
.jstep-h .court{font-size:10.5px;font-weight:700;color:var(--sea-d)}
.jstat{font-size:12px;color:var(--ink-soft);margin-top:4px}
#specSearchInput{font-size:15px}
/* explication qualification */
.qual-list{list-style:none;margin:0;padding:0}
.qual-list li{display:flex;align-items:flex-start;gap:9px;padding:8px 4px;border-bottom:1px solid #f2ecdf;font-size:13px;flex-wrap:wrap}
.qual-list li:last-child{border:none}
.qual-list .q-badge{width:18px;height:18px;border-radius:5px;display:inline-grid;place-items:center;font-size:11px;font-weight:900;flex:none}
.qual-list .q-in .q-badge{background:#E2F0E6;color:var(--ok)}
.qual-list .q-out{opacity:.72}.qual-list .q-out .q-badge{background:#F7E0DC;color:var(--bad)}
.qual-list .cutline{flex-basis:100%;text-align:center;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--coral);margin:4px 0;border-top:1px dashed var(--coral);padding-top:6px}
.qual-list sup{font-size:.7em}

/* ===================== VOLLEY PÉI — DESIGN SYSTEM ===================== */
body{font-family:var(--font-body);background:var(--sand);letter-spacing:-.005em}
::selection{background:var(--ink);color:#fff}
.brand h1,.page-head h2,.empty h4,.tc-name,.auth-card .brand h1{font-family:var(--font-display);letter-spacing:-.02em}
.page-head h2{font-weight:700;letter-spacing:-.03em;font-size:30px}
/* eyebrow -> live pill */
.eyebrow{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);color:var(--ink);padding:5px 12px;border-radius:999px;font-size:11px;letter-spacing:.06em;box-shadow:var(--shadow-soft)}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--red);animation:vp-pulse 1.8s infinite}
/* sidebar -> light glass */
.sidebar{background:rgba(255,255,255,.72);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-right:1px solid var(--line);color:var(--ink)}
.brand .ball{background:conic-gradient(from 210deg,var(--blue),var(--yellow),var(--red),var(--blue));box-shadow:none}
.brand small{color:var(--ink-soft)}
.tname{color:var(--ink-soft);border-top-color:var(--line)}
nav a{color:var(--ink-soft);border-radius:12px;font-weight:500}
nav a .n{background:var(--sand-2);color:var(--ink-soft);border-radius:8px}
nav a:hover{background:var(--sand-2);color:var(--ink)}
nav a.active{background:var(--ink);color:#fff}
nav a.active .n{background:rgba(255,255,255,.2);color:#fff}
.side-foot{border-top-color:var(--line)}
.side-foot button{background:#fff;border:1px solid var(--line);color:var(--ink-soft)}
.side-foot button:hover{background:var(--sand-2);color:var(--ink)}
.side-foot button.demo{background:var(--ink);border-color:var(--ink);color:#fff}
.side-foot button.demo:hover{background:#000}
.side-foot button.danger:hover{background:var(--red);border-color:var(--red);color:#fff}
/* cards */
.card{border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-soft);transition:box-shadow .3s cubic-bezier(.22,1,.36,1),transform .3s cubic-bezier(.22,1,.36,1)}
.card:hover{box-shadow:var(--shadow-card)}
/* buttons */
.btn{border-radius:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.18s cubic-bezier(.22,1,.36,1)}
.btn:hover{background:var(--sand-2);transform:translateY(-1px)}
.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.primary:hover{background:#000;border-color:#000}
.btn.sea{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.sea:hover{background:var(--sea-d);border-color:var(--sea-d)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--sand-2)}
.btn.pill{border-radius:999px}
.btn.sm{border-radius:10px}
/* inputs */
input[type=text],input[type=number],input[type=password],select{border-radius:12px;border-color:var(--line)}
input:focus,select:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(24,24,27,.08)}
/* seg / pills / badges */
.seg{border-radius:12px}
.seg button.on{background:var(--ink);color:#fff}
.pill{border-radius:999px;font-weight:600}
.pill.ok{background:#E8F6EC;color:#15803D}
.pill.warn{background:#FEF3E2;color:#B45309}
.pill.court{background:#EAF0FF;color:var(--sea-d)}
.bracket-tabs button{border-radius:14px}
.bracket-tabs button.active{background:var(--ink);border-color:var(--ink);color:#fff}
/* tabular numbers */
.standtbl,.standtbl td,.standtbl th{font-variant-numeric:tabular-nums}
/* notes / journal -> neutral */
.note{background:#F7F8FA;border:1px solid var(--line);border-radius:14px;color:var(--ink-soft)}
.note b{color:var(--ink)}
.journal{background:#F7F8FA;border-color:var(--line);border-left:3px solid var(--blue)}
.journal .jh{color:var(--sea-d)}
/* home header -> glass white */
.home-head{background:rgba(255,255,255,.72);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);color:var(--ink);border-bottom:1px solid var(--line)}
.home-head .brand h1{color:var(--ink);font-family:var(--font-display)}
.home-head .brand small{color:var(--ink-soft)}
.home-head .brand .ball{background:conic-gradient(from 210deg,var(--blue),var(--yellow),var(--red),var(--blue))}
.t-grid>*{animation:vp-fade-up .5s cubic-bezier(.22,1,.36,1) both}
.t-grid>*:nth-child(2){animation-delay:.06s}.t-grid>*:nth-child(3){animation-delay:.12s}.t-grid>*:nth-child(4){animation-delay:.18s}.t-grid>*:nth-child(5){animation-delay:.24s}.t-grid>*:nth-child(6){animation-delay:.3s}
/* login -> halo + glass + tricolore */
.auth-wrap{background:radial-gradient(900px 520px at 28% -12%,rgba(30,64,175,.13),transparent 60%),radial-gradient(820px 520px at 82% -4%,rgba(245,158,11,.14),transparent 55%),var(--sand)}
.auth-card{border-radius:28px;box-shadow:var(--shadow-card);position:relative;overflow:hidden}
.auth-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue) 0 33.3%,var(--yellow) 33.3% 66.6%,var(--red) 66.6% 100%)}
.auth-card .brand .ball{background:conic-gradient(from 210deg,var(--blue),var(--yellow),var(--red),var(--blue))}
/* spectator -> glass white header */
.spec-head{background:rgba(255,255,255,.82);-webkit-backdrop-filter:saturate(180%) blur(18px);backdrop-filter:saturate(180%) blur(18px);color:var(--ink);border-bottom:1px solid var(--line)}
.spec-head .brand h1{color:var(--ink);font-family:var(--font-display)}
.spec-head .brand small{color:var(--ink-soft)}
.spec-head .brand .ball{background:conic-gradient(from 210deg,var(--blue),var(--yellow),var(--red),var(--blue))}
.live-badge{background:var(--ink);color:#fff}
.spec-tabs{top:53px;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.spec-tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
.spec-sec.coral{color:var(--red)}.spec-sec.sea{color:var(--blue)}
/* QR / qualif accents */
.qr-box{border-radius:18px}
.qual-list .cutline{color:var(--ink);border-top-color:var(--ink)}
/* animations */
@keyframes vp-fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes vp-pulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 8px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.wrap>*{animation:vp-fade-up .5s cubic-bezier(.22,1,.36,1) both}
.wrap>*:nth-child(2){animation-delay:.05s}.wrap>*:nth-child(3){animation-delay:.1s}.wrap>*:nth-child(4){animation-delay:.15s}.wrap>*:nth-child(5){animation-delay:.2s}.wrap>*:nth-child(6){animation-delay:.25s}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.stress-live:empty{display:none}
.stress-live{margin-top:14px}
.stress-bar{height:9px;border-radius:99px;background:var(--sand-2);overflow:hidden}
.stress-bar span{display:block;height:100%;background:var(--ink);transition:width .25s cubic-bezier(.22,1,.36,1)}
.stress-stat{font-size:12.5px;color:var(--ink-soft);margin-top:9px;font-variant-numeric:tabular-nums}
.stress-stat b{color:var(--ink)}
.stress-stat .okk{color:var(--ok);font-weight:700}
.stress-stat .anom{color:var(--bad);font-weight:800}
.stress-bar.indet{position:relative}
.stress-bar.indet span{position:absolute;left:0;width:38%;background:var(--ink);animation:vp-indet 1.1s infinite cubic-bezier(.65,.05,.36,1)}
@keyframes vp-indet{0%{left:-40%}100%{left:102%}}
.verdict{margin-top:14px;border-radius:16px;padding:15px 17px;border:1px solid}
.verdict .vh{font-family:var(--font-display);font-weight:700;font-size:16px;margin-bottom:5px}
.verdict .vb{font-size:13px;line-height:1.5}
.verdict .vb ul{margin:8px 0 4px;padding-left:18px}.verdict .vb li{margin:3px 0}
.verdict.ok{background:#E9F6EE;border-color:#BBE0C7;color:#15692f}.verdict.ok .vh{color:#15803d}
.verdict.bad{background:#FBEAE5;border-color:#EEC4B6;color:#8a3320}.verdict.bad .vh{color:var(--bad)}
/* cloud */
.cloud-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;background:#fff;border:1px solid var(--line);padding:5px 11px;border-radius:999px;white-space:nowrap}
.cloud-badge .cb-dot{width:8px;height:8px;border-radius:50%}
.user-pill{display:inline-flex;align-items:center;font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--sand-2);border:1px solid var(--line);padding:5px 11px;border-radius:999px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cloud-badge.saving .cb-dot,.cloud-badge.connecting .cb-dot{animation:vp-pulse 1.4s infinite}
.cloud-card{border-color:#D9E2F2;background:linear-gradient(180deg,#FAFBFE,#fff)}
.cloud-card pre{background:#0f172a;color:#e2e8f0;padding:13px 15px;border-radius:12px;font-size:11.5px;overflow-x:auto;line-height:1.5;margin:8px 0}
.cloud-sql summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--sea-d)}
.btn.danger{background:#fff;border-color:#EEC4B6;color:var(--bad)}
.btn.danger:hover{background:var(--bad);border-color:var(--bad);color:#fff}
</style>
</head>

<script>
"use strict";
/* ===================== ÉTAT ===================== */
const DEFAULT=()=>({
  config:{name:"Tournoi Cap Homard",poolSizeTarget:5,qualifPerPool:3,points:21,rankMode:"wins",courts:5,courtNames:["Terrain 1","Terrain 2","Terrain 3","Terrain 4","Terrain 5"],centralIndex:-1,demoTeams:40},
  teams:[], qualif:{pools:null}, haute:{pools:null}, basse:{pools:null}, finals:{haute:null,basse:null}
});
let DB={tournaments:[]};
let currentId=null, route="config", finalTab="haute", editId=null;
let S=DEFAULT(); // référence vivante vers le tournoi ouvert
function loadDB(){try{const r=localStorage.getItem("capHomardDB");return r?JSON.parse(r):null;}catch(e){return null;}}
function migrate(){ // récupère un éventuel ancien tournoi unique
  try{const r=localStorage.getItem("capHomard");if(r){const st=JSON.parse(r);return {tournaments:[{id:uid(),name:(st.config&&st.config.name)||"Tournoi",date:"",location:"",createdAt:Date.now(),updatedAt:Date.now(),state:st}]};}}catch(e){}
  return null;
}
function cur(){return DB.tournaments.find(t=>t.id===currentId);}
function persist(){try{if(currentId){const t=cur();if(t)t.updatedAt=Date.now();}if(user)localStorage.setItem(userKey(),JSON.stringify(DB));}catch(e){}scheduleCloudSync();}
const save=persist; // les fonctions du moteur appellent save()
/* ===================== SAAS : AUTH + SYNCHRO SUPABASE ===================== */
let sb=null, user=null, bootErr=null, syncState="idle", authMode="in", authErr="", _cloudTimer=null, _cloudSig={}, _cloudLib=null, _lastUid=null;
function loadSupabaseLib(){
  if(typeof supabase!=="undefined")return Promise.resolve();
  if(_cloudLib)return _cloudLib;
  _cloudLib=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
    s.onload=()=>typeof supabase!=="undefined"?res():rej(new Error("Librairie illisible"));
    s.onerror=()=>rej(new Error("Librairie Supabase inaccessible"));
    document.head.appendChild(s);
    setTimeout(()=>{if(typeof supabase==="undefined")rej(new Error("Délai dépassé"));},12000);
  });
  return _cloudLib;
}
async function boot(){
  try{
    let cfg;
    try{ cfg=await fetch("/api/config",{cache:"no-store"}).then(r=>r.json()); }
    catch(e){ throw new Error("Configuration introuvable (/api/config). Le projet doit être déployé sur Vercel avec le dossier api/."); }
    if(!cfg||!cfg.url||!cfg.anonKey) throw new Error("Variables Supabase manquantes dans Vercel (VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY).");
    console.log("[cloud] config chargée, URL :",cfg.url,"| clé :",(cfg.anonKey||"").slice(0,12)+"…");
    await loadSupabaseLib();
    sb=supabase.createClient(cfg.url,cfg.anonKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    sb.auth.onAuthStateChange((_e,session)=>{ onSession(session); });
    const {data}=await sb.auth.getSession();
    await onSession(data?data.session:null);
  }catch(e){ bootErr=e.message||"Erreur d'initialisation"; render(); }
}
async function onSession(session){
  const u=session?session.user:null;
  const changed=(u?u.id:null)!==_lastUid;
  user=u; _lastUid=u?u.id:null;
  if(user)console.log("[cloud] utilisateur connecté :",user.email,"(id:",user.id+")");
  if(user){ if(changed){ await cloudLoad(); } }
  else { DB={tournaments:[]}; currentId=null; _cloudSig={}; }
  render();
}
function userKey(){return "capDB_"+(user?user.id:"anon");}
function cacheLocal(){try{localStorage.setItem(userKey(),JSON.stringify(DB));}catch(e){}}
function loadLocalCache(){try{const r=localStorage.getItem(userKey());return r?JSON.parse(r):null;}catch(e){return null;}}
function tsig(t){return JSON.stringify({n:t.name,d:t.date,l:t.location,c:t.createdAt,s:t.state});}
async function cloudLoad(){
  syncSet("sync");_cloudSig={};
  try{
    const {data,error}=await sb.from("tournaments").select("id,updated_at,data");
    if(error){console.error("[cloud] ERREUR chargement Supabase:",error,"| message:",error.message,"| details:",error.details,"| hint:",error.hint,"| code:",error.code);throw error;}
    const byId={};
    (data||[]).forEach(row=>{ const t=row.data; if(t&&row.id){ if(t.updatedAt==null&&row.updated_at!=null)t.updatedAt=row.updated_at; byId[row.id]=t; _cloudSig[row.id]=tsig(t);} });
    console.log("[cloud] chargement OK :",(data||[]).length,"tournoi(s) pour cet utilisateur");
    const cache=loadLocalCache();
    if(cache&&cache.tournaments)cache.tournaments.forEach(t=>{ const r=byId[t.id]; if(!r||(t.updatedAt||0)>(r.updatedAt||0))byId[t.id]=t; });
    DB={tournaments:Object.values(byId).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0))};
    cacheLocal(); syncSet("ok");
    await cloudFlush();
  }catch(e){ console.error("[cloud] chargement échoué, repli local:",e&&e.message,e); const cache=loadLocalCache(); if(cache)DB=cache; syncSet("offline"); }
}
function scheduleCloudSync(){ if(!sb||!user)return; clearTimeout(_cloudTimer); _cloudTimer=setTimeout(cloudFlush,1000); }
async function cloudFlush(){
  if(!sb)return;
  // Récupère explicitement l'utilisateur connecté (demande : supabase.auth.getUser())
  if(!user){ try{const {data,error}=await sb.auth.getUser(); if(error)console.error("[cloud] getUser erreur:",error); user=data?data.user:null;}catch(e){console.error("[cloud] getUser exception:",e);} }
  if(!user){ console.warn("[cloud] aucun utilisateur connecté → synchronisation ignorée"); return; }
  try{
    const rows=[];
    DB.tournaments.forEach(t=>{const s=tsig(t);if(_cloudSig[t.id]!==s)rows.push({_id:t.id,_s:s,row:{id:t.id,user_id:user.id,name:t.name||null,event_date:t.date||null,data:t,updated_at:t.updatedAt||Date.now()}});});
    if(rows.length){
      syncSet("sync");
      console.log("[cloud] upsert de",rows.length,"tournoi(s) → table 'tournaments', user_id =",user.id,"| ids :",rows.map(r=>r._id));
      const {data,error}=await sb.from("tournaments").upsert(rows.map(r=>r.row),{onConflict:"id"}).select();
      if(error){ console.error("[cloud] ❌ ERREUR upsert Supabase :",error,"\n  message :",error.message,"\n  details :",error.details,"\n  hint :",error.hint,"\n  code :",error.code); throw error; }
      console.log("[cloud] ✅ upsert OK :",data?data.length:0,"ligne(s) enregistrée(s)");
      rows.forEach(r=>_cloudSig[r._id]=r._s);
    }
    const ids=new Set(DB.tournaments.map(t=>t.id));
    const gone=Object.keys(_cloudSig).filter(id=>!ids.has(id));
    if(gone.length){
      console.log("[cloud] suppression de",gone.length,"tournoi(s) :",gone);
      const {error}=await sb.from("tournaments").delete().in("id",gone);
      if(error){ console.error("[cloud] ❌ ERREUR delete Supabase :",error,error.message,error.details,error.hint,error.code); throw error; }
      gone.forEach(id=>delete _cloudSig[id]);
    }
    syncSet("ok");
  }catch(e){ console.error("[cloud] ❌ synchronisation échouée :",e&&e.message,e); syncSet("error"); }
}

/* ===================== MOTEUR ===================== */
function roundRobin(N){
  let arr=[...Array(N).keys()]; if(N%2===1)arr.push(-1);
  const n=arr.length, rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];let bye=null;
    for(let i=0;i<n/2;i++){const a=arr[i],b=arr[n-1-i];
      if(a===-1||b===-1)bye=(a===-1?b:a);else pairs.push([a,b]);}
    rounds.push({pairs,bye}); arr.splice(1,0,arr.pop()); }
  return rounds;
}
function buildPool(ids){
  const N=ids.length, rounds=roundRobin(N), matches=[], refC=Array(N).fill(0);
  rounds.forEach(rd=>rd.pairs.forEach(([a,b])=>{
    let best=-1,bc=Infinity;
    for(let k=0;k<N;k++){if(k===a||k===b)continue;if(refC[k]<bc){bc=refC[k];best=k;}}
    if(best>=0)refC[best]++; matches.push({i:a,j:b,ref:best});
  }));
  return {teams:[...ids],matches,scores:matches.map(()=>["",""])};
}
/* ===================== CLASSEMENT (canonique, déterministe) =====================
   Critère configurable (config.rankMode) :
     'wins'  (défaut, standard)  : victoires -> coefficient -> différence -> confrontation directe -> ordre stable
     'coeff' (ancienne règle)    : coefficient -> victoires -> différence -> confrontation directe -> ordre stable
   coeff borné (pas d'Infinity) ; confrontation directe sur les matchs entre équipes à égalité parfaite. */
function rankModeNow(){return (S&&S.config&&S.config.rankMode)||"wins";}
function ckeyOf(pf,pc){return pc===0?(pf>0?1e9+pf:0):pf/pc;} // coefficient borné pour le tri
function teamStats(pool){
  const t=pool.teams.map((id,i)=>({i,id,pf:0,pc:0,w:0,l:0,played:0,coeff:0,ckey:0,diff:0,rank:0}));
  pool.matches.forEach((m,idx)=>{const s=pool.scores[idx];
    if(!s||s[0]===""||s[1]===""||s[0]==null||s[1]==null)return;
    const a=+s[0],b=+s[1];if(isNaN(a)||isNaN(b))return;
    const A=t[m.i],B=t[m.j];A.pf+=a;A.pc+=b;B.pf+=b;B.pc+=a;A.played++;B.played++;
    if(a>b){A.w++;B.l++;}else if(b>a){B.w++;A.l++;}});
  t.forEach(x=>{x.diff=x.pf-x.pc;x.coeff=x.pc===0?(x.pf>0?Infinity:0):x.pf/x.pc;x.ckey=ckeyOf(x.pf,x.pc);});
  return t;
}
function primKey(x,mode){return mode==="coeff"?[x.ckey,x.w,x.diff]:[x.w,x.ckey,x.diff];}
function cmpKeys(ka,kb){for(let k=0;k<ka.length;k++){if(ka[k]!==kb[k])return kb[k]-ka[k];}return 0;}
function idCmp(a,b){return a.id<b.id?-1:a.id>b.id?1:0;} // dernier départage : stable et reproductible
function headToHead(pool,group,mode){ // mini-classement sur les seuls matchs entre équipes du groupe
  const set=new Set(group.map(g=>g.i)),ms={};
  group.forEach(g=>ms[g.i]={pf:0,pc:0,w:0});
  pool.matches.forEach((m,idx)=>{if(!set.has(m.i)||!set.has(m.j))return;const s=pool.scores[idx];
    if(!s||s[0]===""||s[1]===""||s[0]==null||s[1]==null)return;const a=+s[0],b=+s[1];if(isNaN(a)||isNaN(b))return;
    ms[m.i].pf+=a;ms[m.i].pc+=b;ms[m.j].pf+=b;ms[m.j].pc+=a;if(a>b)ms[m.i].w++;else if(b>a)ms[m.j].w++;});
  const key=g=>{const x=ms[g.i];return mode==="coeff"?[ckeyOf(x.pf,x.pc),x.w,x.pf-x.pc]:[x.w,ckeyOf(x.pf,x.pc),x.pf-x.pc];};
  return [...group].sort((a,b)=>cmpKeys(key(a),key(b))||idCmp(a,b));
}
function rankPool(pool,mode){
  mode=mode||rankModeNow();
  const t=teamStats(pool),any=t.some(x=>x.played>0);
  let arr=[...t].sort((a,b)=>cmpKeys(primKey(a,mode),primKey(b,mode))||idCmp(a,b));

  while(k<arr.length){

  return {teams:ordered,ordered,complete};
}
/* ===================== AUTO-TEST DU CLASSEMENT ===================== */
function capSelfTest(runs){

  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  function randPool(n,pts){const ids=[];for(let i=0;i<n;i++)ids.push("e"+i);const pool=buildPool(ids);
    pool.scores=pool.matches.map(()=>{const w=pts,l=rnd(0,pts-1);return Math.random()<.5?[w,l]:[l,w];});return pool;}
  function assert(cond,msg){checks++;if(!cond)fails.push(msg);}
  for(const mode of["wins","coeff"]){
    const prevMode=S.config.rankMode;S.config.rankMode=mode;
    for(let r=0;r<runs;r++){
      const n=rnd(2,6),pts=Math.random()<.5?21:25,pool=randPool(n,pts);
      const o1=rankPool(pool,mode),o2=rankPool(pool,mode);
      // déterminisme
      assert(o1.map(x=>x.id).join()===o2.map(x=>x.id).join(),"[non déterministe] mode="+mode);
      // ordre total
      assert(o1.length===n&&new Set(o1.map(x=>x.id)).size===n,"[ordre incomplet] mode="+mode);
      // monotonie selon le critère principal
      for(let i=0;i<o1.length-1;i++){const a=o1[i],b=o1[i+1];
        if(mode==="wins"){assert(a.w>=b.w,"[victoires] une équipe à "+a.w+"V classée devant "+b.w+"V");
          if(a.w===b.w)assert(a.ckey>=b.ckey-1e-9,"[coeff départage] mode=wins");}
        else{assert(a.ckey>=b.ckey-1e-9,"[coeff] mode=coeff");
          if(Math.abs(a.ckey-b.ckey)<1e-9)assert(a.w>=b.w,"[victoires départage] mode=coeff");}}
    }
    S.config.rankMode=prevMode;
  }
  // sélection des meilleurs Ne entre poules : au sein d'une même position, ordre = comparateur canonique
  for(let r=0;r<runs;r++){
    const np=rnd(3,8),pts=21,pools=[];for(let p=0;p<np;p++)pools.push(randPool(rnd(4,5),pts));
    const byPos={};
    pools.forEach(p=>rankPool(p).forEach((e,idx)=>{(byPos[idx]=byPos[idx]||[]).push(e);}));
    let expected=[];
    Object.keys(byPos).map(Number).sort((a,b)=>a-b).forEach(pos=>{[...byPos[pos]].sort(crossCmp).forEach(e=>expected.push(e.id));});

  }
  // confrontation directe : 2 équipes à stats égales, celle qui a gagné le duel passe devant
  (function(){const ids=["A","B","C"];const pool=buildPool(ids); // 3 matchs : (0,1)(0,2)(1,2)
    // A bat B ; B bat C 21-10 ; A perd vs C 10-21  -> A,B,C visent l'égalité, duel A-B tranche
    const map={};pool.matches.forEach((m,idx)=>map[m.i+'-'+m.j]=idx);
    pool.scores=pool.matches.map(()=>[0,0]);
    pool.scores[map['0-1']]=[21,19]; // A bat B
    pool.scores[map['1-2']]=[21,10]; // B bat C
    pool.scores[map['0-2']]=[10,21]; // C bat A
    S.config.rankMode="wins";const o=rankPool(pool,"wins");
    // A,B,C ont chacun 1 victoire. Départage coeff/diff puis confrontation directe.
    assert(o.length===3,"[h2h] taille");
  })();
  return {checks,fails:fails.slice(0,12),failCount:fails.length,ok:fails.length===0};
}

/* --- Moteur de répartition optimale (priorités : format choisi > terrains/rotations > aucune équipe seule > éviter 6 > adapter 3/4/5) --- */
function minSize(){return S.config.qualifPerPool+1;} // taille > nb de qualifiés
function effTarget(){return Math.max(minSize(),Math.min(5,S.config.poolSizeTarget||5));}
function evenPartition(T,k){const base=Math.floor(T/k),rem=T-base*k;return Array.from({length:k},(_,i)=>base+(i<rem?1:0));}
// clé lexicographique (plus petit = meilleur) : [poules de 6+, -(poules à la taille cible), écart total, poules de 3, nb de poules]
function sizeKey(sizes,t){let six=0,atT=0,dev=0,three=0;sizes.forEach(s=>{if(s>=6)six++;if(s===t)atT++;dev+=Math.abs(s-t);if(s===3)three++;});return [six,-atT,dev,three,sizes.length];}
function keyLess(a,b){for(let i=0;i<a.length;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}
function bestSizes(T){
  if(T<=0)return[];
  const m=minSize(),t=effTarget();
  let best=null,bestKey=null;
  for(let k=1;k<=T;k++){
    const s=evenPartition(T,k);
    if(Math.min(...s)<m)continue;       // jamais une poule ≤ nb de qualifiés
    if(Math.max(...s)>6)continue;       // jamais 7+
    const key=sizeKey(s,t);
    if(!bestKey||keyLess(key,bestKey)){bestKey=key;best=s;}
  }
  if(best)return best;
  // repli ultime (effectif minuscule incompatible) : le moins mauvais sans 7+
  for(let k=1;k<=T;k++){const s=evenPartition(T,k);if(Math.max(...s)<=6)return s;}
  return [T];

function makePoolsSized(seedIds,otherIds,sizes){
  const pools=sizes.map(()=>[]);
  const seeds=[...seedIds],others=[...otherIds];
  for(let i=0;i<sizes.length;i++){if(seeds.length)pools[i].push(seeds.shift());}
  const rest=[...seeds,...others];let fwd=true;
  while(rest.length){const order=fwd?[...sizes.keys()]:[...sizes.keys()].reverse();let placed=false;
    for(const p of order){if(pools[p].length<sizes[p]&&rest.length){pools[p].push(rest.shift());placed=true;}}
    fwd=!fwd;if(!placed)break;}
  return pools.map(ids=>buildPool(ids));
}
function repoolSized(recs,sizes){
  const sorted=[...recs].sort((a,b)=>a.pos-b.pos||b.coeff-a.coeff);
  const pools=sizes.map(()=>[]);let fwd=true,idx=0;
  while(idx<sorted.length){const order=fwd?[...sizes.keys()]:[...sizes.keys()].reverse();let placed=false;
    for(const p of order){if(pools[p].length<sizes[p]&&idx<sorted.length){pools[p].push(sorted[idx].id);idx++;placed=true;}}
    fwd=!fwd;if(!placed)break;}
  return pools.map(ids=>buildPool(ids));
}
/* --- Assignation après-midi : priorité 1) éviter les re-matchs 2) disperser les classements 3) tailles 4) équilibre niveau --- */
function morningCoPool(){ // id -> Set des coéquipiers de poule du matin
  const m=new Map();
  if(S.qualif.pools)S.qualif.pools.forEach(p=>{const ids=p.teams;ids.forEach(a=>{const set=m.get(a)||new Set();ids.forEach(b=>{if(b!==a)set.add(b);});m.set(a,set);});});
  return m;
}
function groupTiers(recs){const m={};recs.forEach(r=>{(m[r.pos]=m[r.pos]||[]).push(r);});return Object.keys(m).map(Number).sort((a,b)=>a-b).map(pos=>m[pos].slice().sort((a,b)=>b.coeff-a.coeff));}
function reCount(arr,rec,co){const s=co.get(rec.id);if(!s)return 0;let c=0;for(const x of arr)if(s.has(x.id))c++;return c;}
function totalRe(pools,co){let c=0;pools.forEach(P=>{for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const s=co.get(P[i].id);if(s&&s.has(P[j].id))c++;}});return c;}
function tierPen(pools){let p=0;pools.forEach(P=>{const b={};P.forEach(r=>b[r.pos]=(b[r.pos]||0)+1);Object.values(b).forEach(n=>{if(n>1)p+=n-1;});});return p;}
function levelPen(pools){const a=pools.map(P=>P.length?P.reduce((s,r)=>s+Math.min(r.coeff,9),0)/P.length:0);const mn=a.reduce((s,v)=>s+v,0)/(a.length||1);return a.reduce((s,v)=>s+(v-mn)*(v-mn),0);}
function scoreAssign(pools,co){return [totalRe(pools,co),tierPen(pools),levelPen(pools)];}
function lessK(a,b){for(let i=0;i<a.length;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}
function buildAfternoonPools(recs,sizes,co){
  if(recs.length===0)return {poolIds:[],reMatch:0};
  let best=null;
  for(let att=0;att<60;att++){
    const tiers=groupTiers(recs);let order=[];
    tiers.forEach(t=>{order=order.concat(att===0?t:shuffle(t));});
    const pools=sizes.map(()=>[]);
    for(const rec of order){
      let bp=-1,bk=null;
      for(let p=0;p<pools.length;p++){
        if(pools[p].length>=sizes[p])continue;
        const key=[reCount(pools[p],rec,co),pools[p].filter(x=>x.pos===rec.pos).length,pools[p].length,pools[p].reduce((a,x)=>a+Math.min(x.coeff,9),0),Math.random()];
        if(bk===null||lessK(key,bk)){bk=key;bp=p;}
      }
      if(bp<0)bp=pools.findIndex((P,p)=>P.length<sizes[p]);
      pools[bp].push(rec);
    }
    const sc=scoreAssign(pools,co);
    if(!best||lessK(sc,best.sc))best={pools:pools.map(P=>P.slice()),sc};
  }
  // amélioration locale par échanges (réduit re-matchs puis déséquilibres)
  let guard=0,improved=true;
  while(improved&&guard++<25){
    improved=false;const P=best.pools;
    for(let a=0;a<P.length&&!improved;a++)for(let b=a+1;b<P.length&&!improved;b++)
      for(let i=0;i<P[a].length&&!improved;i++)for(let j=0;j<P[b].length;j++){
        const t=P[a][i];P[a][i]=P[b][j];P[b][j]=t;
        const sc=scoreAssign(P,co);
        if(lessK(sc,best.sc)){best.sc=sc;improved=true;break;}
        const t2=P[a][i];P[a][i]=P[b][j];P[b][j]=t2;
      }
  }
  return {poolIds:best.pools.map(P=>P.map(r=>r.id)),reMatch:best.sc[0]};
}
function rankAllFromPools(pools){
  const byPos={};
  pools.forEach(p=>poolStandings(p).ordered.forEach((e,idx)=>{(byPos[idx]=byPos[idx]||[]).push({id:e.id,w:e.w,ckey:e.ckey,diff:e.diff,coeff:e.coeff});}));
  const out=[];
  Object.keys(byPos).map(Number).sort((a,b)=>a-b).forEach(pos=>byPos[pos].sort(crossCmp).forEach(x=>out.push(x)));
  return out;
}
function seedList(n){let a=[1,2];while(a.length<n){const m=a.length*2+1,b=[];a.forEach(x=>{b.push(x);b.push(m-x);});a=b;}return a;}
function makeBracket(ranked){
  if(ranked.length<2)return null;
  let size=1;while(size*2<=ranked.length)size*=2;
  const qual=ranked.slice(0,size).map((x,i)=>({id:x.id,seed:i+1}));
  const order=seedList(size),r1=[];
  for(let k=0;k<size;k+=2)r1.push({a:qual[order[k]-1],b:qual[order[k+1]-1],sa:"",sb:""});
  return {size,rounds:[r1],extra:{petite:{sa:"",sb:""}}};
}
function bWin(m){if(m.sa===""||m.sb==="")return null;return +m.sa>+m.sb?m.a:m.b;}
function bLose(m){if(m.sa===""||m.sb==="")return null;return +m.sa>+m.sb?m.b:m.a;}
function same(x,y){return (x&&y&&x.id===y.id)||(!x&&!y);}
function advance(br){
  let cur=br.rounds[0],ri=1;
  while(cur.length>1){const need=cur.length/2;
    if(!br.rounds[ri])br.rounds[ri]=Array.from({length:need},()=>({a:null,b:null,sa:"",sb:""}));
    const next=br.rounds[ri];
    for(let i=0;i<need;i++){const w1=bWin(cur[2*i]),w2=bWin(cur[2*i+1]),m=next[i];
      const ch=!same(m.a,w1)||!same(m.b,w2);m.a=w1;m.b=w2;if(ch){m.sa="";m.sb="";}}
    cur=next;ri++;}
  br.rounds.length=ri;
}

    <div class="note"><b>Règle de répartition :</b> 1) respecter ta taille de référence ; 2) respecter les terrains (rotations) ; 3) n'oublier aucune équipe ; 4) éviter les poules de 6 ; 5) sinon adapter en 3/4/5. Les poules de 3 ne sont autorisées que si la taille minimale (${minSize()}) le permet. Classement au <b>coefficient = points pour ÷ points contre</b>, les <b>${c.qualifPerPool} premiers</b> montent en Tableau Haut.</div>
  </div>

    <div class="row"><button class="btn sea" onclick="generateDemo()">⚡ Démo</button><button class="btn primary" onclick="go('teams')">Ajouter les équipes →</button></div></div></div>`;
}

      :`<div class="verdict bad"><div class="vh">⚠ ${d.failCount} erreur(s) détectée(s)</div><div class="vb">Sur ${d.sims.toLocaleString('fr')} simulations :<ul>${d.fails.map(f=>'<li>'+esc(f)+'</li>').join("")}</ul>Corrige la configuration ou signale-le moi.</div></div>`;

/* ===================== 2. ÉQUIPES ===================== */

/* ===================== POOL CARD (réutilisable) ===================== */
function poolCard(phase,idx,L,sea){
  const store=phaseStore(phase),pool=store.pools[idx],st=poolStandings(pool);
  const qpp=S.config.qualifPerPool;
  const courtInfo=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx);
  const rows=pool.matches.map((m,mi)=>{
    const id1=pool.teams[m.i],id2=pool.teams[m.j],ref=m.ref>=0?pool.teams[m.ref]:null;
    const s=pool.scores[mi]||["",""];
    const w1=s[0]!==""&&s[1]!==""&&+s[0]>+s[1],w2=s[0]!==""&&s[1]!==""&&+s[1]>+s[0];
    return `<div class="match"><span class="mno">${mi+1}</span>
      <span class="nm1 ${w1?'win':''}" title="${esc(teamName(id1))}">${esc(teamName(id1))}</span>
      <input type="number" min="0" value="${s[0]}" onchange="setScore('${phase}',${idx},${mi},0,this.value)">
      <span class="vs">—</span>
      <input type="number" min="0" value="${s[1]}" onchange="setScore('${phase}',${idx},${mi},1,this.value)">
      <span class="nm2 ${w2?'win':''}" title="${esc(teamName(id2))}">${esc(teamName(id2))}</span></div>
      <div class="ref">${ref?`arbitre : <b>${esc(teamName(ref))}</b>`:'&nbsp;'}</div>`;
  }).join("");
  const tbl=`<table class="standtbl"><thead><tr><th></th><th style="text-align:left">Équipe</th><th>V</th><th>Pour</th><th>Con</th><th>Coeff</th></tr></thead><tbody>${st.ordered.map((x)=>{
    const up = phase==="qualif" && x.rank>0 && x.rank<=qpp;
    return `<tr class="${x.rank===1?'r1':''} ${up&&x.rank!==1?'q':''} ${up?'qd':''}"><td><span class="rk">${x.rank||'-'}</span></td><td class="nm">${esc(teamName(x.id))}</td><td>${x.w}</td><td>${x.pf}</td><td>${x.pc}</td><td style="font-weight:700">${fmtCoeff(x.coeff)}</td></tr>`;
  }).join("")}</tbody></table>`;
  return `<div class="pool"><div class="pool-h ${sea?'sea':''}"><div class="t"><span class="badge">${L}</span>Poule ${L}</div>${courtInfo?`<span class="court-tag" title="${esc(courtName(courtInfo.court-1))}">${esc(courtName(courtInfo.court-1))}${courtInfo.rotation>1?'·r'+courtInfo.rotation:''}</span>`:(st.complete?'<span class="court-tag">fini</span>':'')}</div>
   <div class="pool-body">${rows}<div style="height:4px"></div>${tbl}</div></div>`;
}
function phaseStore(phase){return phase==="qualif"?S.qualif:phase==="haute"?S.haute:S.basse;}
function setScore(phase,idx,mi,side,val){
  const pool=phaseStore(phase).pools[idx];
  pool.scores[mi][side]=val===""?"":(+val);
  if(phase==="qualif")resetFrom('split');else resetFrom('finals');
  render();
}

function pagePools(){
  if(!S.qualif.pools)return head("Étape 4","Poules de qualification","")+emptyState("▦","Pas encore de poules","Lance d'abord le tirage.",`<button class="btn primary" style="margin-top:14px" onclick="go('draw')">Aller au tirage</button>`);
  let done=S.qualif.pools.filter(p=>poolStandings(p).complete).length;
  const tot=S.qualif.pools.length;
  return head("Étape 4","Poules de qualification",`Round-robin : chaque équipe affronte toutes les autres de sa poule. Matchs en ${S.config.points} points. Classement automatique au coefficient. Les ${S.config.qualifPerPool} premiers (surlignés) montent en Tableau Haut.`)+
   journalQualif()+
   `<div class="spread" style="margin-bottom:16px"><span class="pill ${done===tot?'ok':''}">${done}/${tot} poules terminées</span><button class="btn sm" onclick="go('split')">Qualification H/B →</button></div>
    <div class="pool-grid">${S.qualif.pools.map((p,idx)=>poolCard("qualif",idx,plabel(idx),false)).join("")}</div>`;
}

/* ===================== 6. QUALIFICATION H/B ===================== */
function qualifComplete(){return S.qualif.pools&&S.qualif.pools.every(p=>poolStandings(p).complete);}
function buildHB(){
  const qpp=S.config.qualifPerPool;let haut=[],cons=[];
  S.qualif.pools.forEach(p=>poolStandings(p).ordered.forEach((e,idx)=>{
    const r={id:e.id,w:e.w,ckey:e.ckey,diff:e.diff,coeff:e.coeff===Infinity?1e9:e.coeff,pos:idx+1};(idx<qpp?haut:cons).push(r);}));
  cons.sort((a,b)=>a.pos-b.pos||crossCmp(a,b)); // repêchage : meilleur non-qualifié d'abord (rang puis classement canonique)
  // repêchage minimal (Bas→Haut uniquement) pour que les deux tableaux tiennent en poules de 4/5
  let promo=0;
  for(let p=0;p<=cons.length;p++){const nb=haut.length+p,nc=cons.length-p;
    if(feasibleClean(nb)&&(nc===0||feasibleClean(nc))){promo=p;break;}}
  const repsUp=cons.slice(0,promo), hautAll=haut.concat(repsUp), consRest=cons.slice(promo);
  const co=morningCoPool();
  const hRes=buildAfternoonPools(hautAll,bestSizes(hautAll.length),co);
  const bRes=buildAfternoonPools(consRest,bestSizes(consRest.length),co);
  S.haute.pools=hRes.poolIds.map(ids=>buildPool(ids));
  S.basse.pools=bRes.poolIds.map(ids=>buildPool(ids));
  S._repeche={count:promo,ids:repsUp.map(r=>r.id)};
  S._afternoon={haute:{reMatch:hRes.reMatch},basse:{reMatch:bRes.reMatch}};
  S.finals={haute:null,basse:null};
}
function pageSplit(){
  if(!S.qualif.pools)return head("Étape 5","Qualification Haute / Basse","")+emptyState("⇅","Poules non créées","Fais le tirage et la saisie d'abord.","");
  const complete=qualifComplete();
  let body;
  if(!S.haute.pools){
    body=emptyState("⇅",complete?"Qualification prête":"Termine d'abord les poules",

/* ===================== 8. PHASES FINALES ===================== */
function hbComplete(store){return store.pools&&store.pools.every(p=>poolStandings(p).complete);}
function ensureFinals(fill){
  if(hbComplete(S.haute)&&!S.finals.haute)S.finals.haute=makeBracket(rankAllFromPools(S.haute.pools));
  if(hbComplete(S.basse)&&!S.finals.basse)S.finals.basse=makeBracket(rankAllFromPools(S.basse.pools));

}
function fillBracket(br){
  if(!br)return; advance(br);
  for(let ri=0;ri<br.rounds.length;ri++){br.rounds[ri].forEach(m=>{if(m.a&&m.b){const[a,b]=randScore();m.sa=a;m.sb=b;}});advance(br);}
  const total=br.rounds.length;
  if(total>=2){const semis=br.rounds[total-2],l1=bLose(semis[0]),l2=semis[1]?bLose(semis[1]):null;
    br.extra.petite.a=l1;br.extra.petite.b=l2;if(l1&&l2){const[a,b]=randScore();br.extra.petite.sa=a;br.extra.petite.sb=b;}}
}
function roundName(remaining){return {1:"Finale",2:"Demi-finales",3:"Quarts de finale",4:"8es de finale",5:"16es de finale",6:"32es de finale"}[remaining]||("Tour");}
function pageFinals(){

  const store=finalTab==="haute"?S.haute:S.basse,br=S.finals[finalTab];

  else if(!br||br.size<2)body=emptyState("♛","Pas assez de qualifiés","Il faut au moins 2 équipes qualifiées pour un tableau.","");
  else body=renderBracket(finalTab)+(finalTab==="haute"?explainBlock(S.haute.pools,S.finals.haute,"H","Tableau principal","var(--coral)"):explainBlock(S.basse.pools,S.finals.basse,"C","Consolante","var(--sea)"));
  return head("Étape 7","Phases finales",`Tableaux à élimination directe générés automatiquement selon le nombre de qualifiés (4, 8, 16, 32…). Saisis les scores : les vainqueurs avancent seuls.`)+
    journalFinals()+
    `<div class="bracket-tabs">${tab("haute","▲ Tableau principal","var(--coral)")}${tab("basse","▼ Consolante","var(--sea)")}</div>${body}`;
}
function courtBadge(matchSeq,isBig){
  const c=S.config;

}
function renderBracket(side){

    return `<div class="round ${consol}"><h4>${roundName(remaining)}</h4>${rd.map((m,mi)=>bmatchHTML(side,ri,mi,m,ri===0,courtBadge(seq++,big))).join("")}</div>`;
  }).join("");

    const semis=br.rounds[total-2],l1=bLose(semis[0]),l2=semis[1]?bLose(semis[1]):null;

function bmatchHTML(side,ri,mi,m,editable,courtTag){

  const br=S.finals[side],m=ri==="P"?br.extra.petite:br.rounds[+ri][mi];

function pageFinal(){

    const br=S.finals[side];

/* ===================== LIVE / SPECTATEUR / PARTAGE ===================== */
function liveBase(){return location.href.split("#")[0];}
function encodeSnapshot(t){
  const st=t.state, ids=st.teams.map(x=>x.id), ix=new Map(ids.map((id,i)=>[id,i]));
  const packPool=p=>({t:p.teams.map(id=>ix.get(id)),s:p.scores.map(sc=>(sc&&sc[0]!==""&&sc[1]!=="")?[+sc[0],+sc[1]]:0)});
  const packBr=br=>{if(!br)return null;advance(br);return {z:br.size,r:br.rounds.map(rd=>rd.map(m=>[m.sa===""?-1:+m.sa,m.sb===""?-1:+m.sb])),p:[br.extra&&br.extra.petite&&br.extra.petite.sa!==""?+br.extra.petite.sa:-1,br.extra&&br.extra.petite&&br.extra.petite.sb!==""?+br.extra.petite.sb:-1]};};
  const snap={v:1,n:t.name,d:t.date,l:t.location,
    c:{pts:st.config.points,qpp:st.config.qualifPerPool,rm:st.config.rankMode||"wins",cn:st.config.courtNames,ci:st.config.centralIndex,cr:st.config.courts},
    T:st.teams.map(x=>x.name),
    Q:st.qualif&&st.qualif.pools?st.qualif.pools.map(packPool):null,
    H:st.haute&&st.haute.pools?st.haute.pools.map(packPool):null,
    B:st.basse&&st.basse.pools?st.basse.pools.map(packPool):null,
    FH:packBr(st.finals&&st.finals.haute),FB:packBr(st.finals&&st.finals.basse),
    RP:st._repeche?st._repeche.ids.map(id=>ix.get(id)):[]};
  return LZString.compressToEncodedURIComponent(JSON.stringify(snap));
}
function decodeSnapshot(str){
  const o=JSON.parse(LZString.decompressFromEncodedURIComponent(str));
  const teams=o.T.map((name,i)=>({id:String(i),name,seed:false}));
  const unpackPool=pp=>{const ids=pp.t.map(i=>String(i));const pool=buildPool(ids);
    pool.scores=pool.matches.map((m,k)=>{const s=pp.s[k];return (s&&s.length===2)?[s[0],s[1]]:["",""];});return pool;};
  const state={config:{name:o.n,points:o.c.pts,qualifPerPool:o.c.qqp||o.c.qpp,rankMode:o.c.rm,courtNames:o.c.cn||[],centralIndex:o.c.ci==null?-1:o.c.ci,courts:o.c.cr||1,poolSizeTarget:5,demoTeams:40},
    teams, qualif:{pools:o.Q?o.Q.map(unpackPool):null}, haute:{pools:o.H?o.H.map(unpackPool):null}, basse:{pools:o.B?o.B.map(unpackPool):null}, finals:{haute:null,basse:null},
    _repeche:{count:(o.RP||[]).length,ids:(o.RP||[]).map(i=>String(i))}};
  const prevS=S;S=state; // contexte pour reconstruire les tableaux (classement)
  const rebuildBr=(packed,pools)=>{if(!packed||!pools)return null;const br=makeBracket(rankAllFromPools(pools));if(!br)return null;advance(br);
    (packed.r||[]).forEach((rd,ri)=>{if(br.rounds[ri])rd.forEach((sc,mi)=>{if(br.rounds[ri][mi]){br.rounds[ri][mi].sa=sc[0]<0?"":sc[0];br.rounds[ri][mi].sb=sc[1]<0?"":sc[1];}});advance(br);});
    if(packed.p&&br.extra&&br.extra.petite){br.extra.petite.sa=packed.p[0]<0?"":packed.p[0];br.extra.petite.sb=packed.p[1]<0?"":packed.p[1];}return br;};
  state.finals.haute=rebuildBr(o.FH,state.haute.pools);
  state.finals.basse=rebuildBr(o.FB,state.basse.pools);
  S=prevS;
  return {id:"snap",name:o.n,date:o.d,location:o.l,state};
}
function liveLink(id){return liveBase()+"#/live/"+encodeURIComponent(id);}
function snapLink(t){return liveBase()+"#/v/"+encodeSnapshot(t);}
function parseHash(){const h=location.hash||"";let m;
  if(m=h.match(/^#\/live\/(.+)$/))return{mode:"live",id:decodeURIComponent(m[1])};
  if(m=h.match(/^#\/v\/(.+)$/))return{mode:"snap",data:m[1]};
  return null;}
window.addEventListener("hashchange",render);

function poolPosOf(pools,id){if(!pools)return null;for(let i=0;i<pools.length;i++){const o=poolStandings(pools[i]).ordered;const k=o.findIndex(x=>x.id===id);if(k>=0)return{poolIndex:i,pos:k+1,stat:o[k],complete:poolStandings(pools[i]).complete};}return null;}
function bracketStatusOf(br,id){
  if(!br)return null;advance(br);const total=br.rounds.length;let last=-1,lm=null;
  for(let r=0;r<total;r++)for(const m of br.rounds[r])if((m.a&&m.a.id===id)||(m.b&&m.b.id===id)){last=r;lm=m;}
  const pm=br.extra&&br.extra.petite;
  if(pm&&((pm.a&&pm.a.id===id)||(pm.b&&pm.b.id===id))){if(pm.sa!==""&&pm.sb!==""){const w=bWin(pm);return w&&w.id===id?{label:"3e place 🥉",cls:"ok"}:{label:"4e place",cls:"sea"};}return{label:"Petite finale (à jouer)",cls:"play"};}
  if(last<0)return null;
  const champ=bWin(br.rounds[total-1][0]);if(champ&&champ.id===id)return{label:"🏆 Vainqueur",cls:"gold"};
  if(lm&&lm.sa!==""&&lm.sb!==""){const w=bWin(lm);if(w&&w.id===id)return{label:"Qualifié(e) — tour suivant",cls:"ok"};return{label:"Éliminé(e) en "+roundName(total-last),cls:"out"};}
  return{label:"En lice — "+roundName(total-last),cls:"play"};
}
function teamJourney(id){
  const steps=[];let status={label:"Inscrit(e)",cls:""};
  const qp=S.qualif&&S.qualif.pools;
  if(!qp)return{steps,status};
  const qi=poolPosOf(qp,id);
  const qComplete=qp.every(p=>poolStandings(p).complete);
  if(qi)steps.push({phase:"Poule de qualification",pool:plabel(qi.poolIndex),pos:qi.pos,stat:qi.stat,complete:qi.complete});
  const hi=poolPosOf(S.haute&&S.haute.pools,id),bi=poolPosOf(S.basse&&S.basse.pools,id);
  const repeche=S._repeche&&S._repeche.ids&&S._repeche.ids.indexOf(id)>=0;
  if(hi)steps.push({phase:"Tableau Haut",pool:"H"+(hi.poolIndex+1),pos:hi.pos,stat:hi.stat,complete:hi.complete,repeche});
  if(bi)steps.push({phase:"Consolante",pool:"C"+(bi.poolIndex+1),pos:bi.pos,stat:bi.stat,complete:bi.complete});
  if(!qComplete){status={label:qi?"En poule — qualification":"Inscrit(e)",cls:"play"};return{steps,status};}
  if(hi)status=repeche?{label:"Repêché(e) — Tableau Haut",cls:"repe"}:{label:"Qualifié(e) — Tableau Haut",cls:"ok"};
  else if(bi)status={label:"En Consolante",cls:"sea"};
  else status={label:"Éliminé(e) en poules",cls:"out"};
  const fin=hi?(S.finals&&S.finals.haute):bi?(S.finals&&S.finals.basse):null;
  const afterComplete=(hi&&S.haute.pools.every(p=>poolStandings(p).complete))||(bi&&S.basse.pools.every(p=>poolStandings(p).complete));
  if(fin){const bs=bracketStatusOf(fin,id);if(bs)status=bs;else if(afterComplete)status={label:"Non qualifié(e) pour le tableau",cls:"out"};}
  return{steps,status};
}
function explainQualification(pools,bracket){
  if(!bracket||!pools||!pools.length)return null;
  const byPos={};
  pools.forEach((p,pi)=>poolStandings(p).ordered.forEach((e,idx)=>{(byPos[idx]=byPos[idx]||[]).push({id:e.id,pos:idx+1,poolIndex:pi,w:e.w,coeff:e.coeff,ckey:e.ckey,diff:e.diff});}));
  const order=[];Object.keys(byPos).map(Number).sort((a,b)=>a-b).forEach(pos=>{[...byPos[pos]].sort(crossCmp).forEach(x=>order.push(x));});
  const size=bracket.size;
  const posGroups={};order.forEach((x,i)=>{(posGroups[x.pos]=posGroups[x.pos]||[]).push(i);});
  const rows=order.map((x,i)=>{
    const qualified=i<size;const grp=posGroups[x.pos];const grpAllIn=grp[grp.length-1]<size;const grpAllOut=grp[0]>=size;
    const coeffTxt=x.coeff===Infinity?"Max":(x.coeff||0).toFixed(2);
    let why;
    if(qualified){
      if(grpAllIn)why=`${x.pos}<sup>${x.pos===1?'re':'e'}</sup> de la poule {P}${x.poolIndex+1}`;
      else why=`meilleur ${x.pos}<sup>e</sup> (${x.w} victoire${x.w>1?'s':''}, coeff ${coeffTxt}, diff ${x.diff>=0?'+':''}${x.diff})`;
    } else {
      if(grpAllOut)why=`${x.pos}<sup>e</sup> de poule — non qualifié(e)`;
      else why=`${x.pos}<sup>e</sup> non retenu(e) (${x.w} victoire${x.w>1?'s':''}, coeff ${coeffTxt}, diff ${x.diff>=0?'+':''}${x.diff}) — derrière au départage`;
    }
    return {id:x.id,qualified,why,poolIndex:x.poolIndex};
  });
  return {rows:rows.filter((r,i)=>i<size+4),size,total:order.length};
}
function explainBlock(pools,bracket,prefix,title,col){
  const ex=explainQualification(pools,bracket);if(!ex)return "";
  const lis=ex.rows.map((r,i)=>`<li class="${r.qualified?'q-in':'q-out'}">${i===ex.size?'<div class="cutline">barre de qualification</div>':''}<span class="q-badge">${r.qualified?'✓':'✗'}</span><b>${esc(teamName(r.id))}</b> — ${r.why.replace('{P}',prefix)}</li>`).join("");
  return `<div class="card"><h3 class="sec" style="color:${col}">Explication de la qualification — ${title}</h3>
    <p class="muted tiny" style="margin:-6px 0 10px">${ex.size} équipes qualifiées sur ${ex.total}. Critère : ${(S.config.rankMode||'wins')==='wins'?'victoires → coefficient → différence → confrontation directe':'coefficient → victoires'}.</p>
    <ul class="qual-list">${lis}</ul></div>`;
}

function pageShare(){
  const t=cur();if(!t)return head("Live","Partage","");
  return head("Diffusion","Live & partage",`Donne aux joueurs un accès en lecture seule : classements, statuts, matchs à venir et tableaux finaux, depuis leur téléphone.`)+
  `<div class="card">
     <h3 class="sec">Lien instantané pour les joueurs (recommandé)</h3>
     <p class="muted tiny" style="margin:-6px 0 12px">Ce lien <b>embarque l'état actuel</b> du tournoi : il fonctionne sur n'importe quel téléphone, sans connexion partagée. C'est un <b>instantané</b> — régénère-le pour publier les derniers résultats.</p>
     <div id="qrZone" class="qr-zone"><p class="muted tiny">Clique sur « Générer » pour créer le lien et le QR code.</p></div>
     <div class="row" style="margin-top:14px">
       <button class="btn primary" onclick="genShare()">🔄 Générer / mettre à jour</button>
       <button class="btn" onclick="copyShare()">⧉ Copier le lien</button>
       <button class="btn sea" onclick="openSpectator()">👁 Aperçu spectateur</button>
     </div>
     <input type="text" id="shareUrl" readonly placeholder="Le lien apparaîtra ici…" style="margin-top:12px;font-size:12px">
     <div class="note" style="margin-top:14px"><b>Mode d'emploi :</b> affiche le QR sur un écran (ou imprime-le) ; les joueurs le scannent et voient le tournoi. Comme c'est un instantané, regénère le QR après chaque vague de résultats.</div>
   </div>
   <div class="card"><h3 class="sec">Aperçu local (même appareil)</h3>
     <p class="muted tiny" style="margin:-6px 0 10px">Ouvre la vue spectateur de ce tournoi dans ce navigateur (pour la projeter sur un écran branché ici).</p>
     <button class="btn" onclick="openSpectator()">Ouvrir la vue spectateur →</button></div>`;
}
function genShare(){
  const t=cur();if(!t)return;let url;try{url=snapLink(t);}catch(e){toast("Erreur");return;}
  document.getElementById("shareUrl").value=url;
  const zone=document.getElementById("qrZone");
  try{const q=qrcode(0,"M");q.addData(url);q.make();
    zone.innerHTML=`<div class="qr-box">${q.createSvgTag({cellSize:4,margin:2,scalable:true})}</div><div class="muted tiny" style="text-align:center;margin-top:8px">${q.getModuleCount()}×${q.getModuleCount()} modules — scanne avec l'appareil photo</div>`;
  }catch(e){zone.innerHTML=`<div class="note" style="background:#FAE9DF;border-color:#E8C3B0;color:#8a3d22;margin:0">Tournoi trop volumineux pour un QR lisible — utilise le <b>lien</b> ci-dessous (copie / envoi par message).</div>`;}
  toast("Lien & QR générés");
}
function copyShare(){const el=document.getElementById("shareUrl");if(!el.value)genShare();el.select();try{navigator.clipboard.writeText(el.value);}catch(e){try{document.execCommand("copy");}catch(_){}}toast("Lien copié");}
function openSpectator(){const t=cur();if(!t)return;location.hash="#/live/"+encodeURIComponent(t.id);}

let specTab="classements", specQuery="";
function renderSpectator(sp,root){
  let t=null,err=null;
  try{ if(sp.mode==="live"){t=DB.tournaments.find(x=>x.id===sp.id);if(!t)err="Ce tournoi n'est pas enregistré sur cet appareil. Demandez à l'organisateur le lien/QR instantané.";}
       else {t=decodeSnapshot(sp.data);} }
  catch(e){err="Lien invalide ou illisible.";}
  if(err){root.innerHTML=`<div class="spec"><div class="spec-head"><div class="brand"><div class="ball"></div><div><h1>Cap Homard — Live</h1></div></div></div><div class="spec-body"><div class="card"><div class="empty"><div class="big">📡</div><h4>Indisponible</h4><p class="muted">${err}</p><a class="btn" style="margin-top:14px" href="${liveBase()}">← Accueil</a></div></div></div></div>`;return;}
  S=t.state;ensureCourts();window._specT=t;
  root.innerHTML=spectatorView(t);
}
function specGo(tab){specTab=tab;document.getElementById("root").innerHTML=spectatorView(window._specT||{name:"",state:S});}
function spectatorView(t){
  const phase=!S.qualif||!S.qualif.pools?"Inscriptions":(S.finals&&(S.finals.haute||S.finals.basse))?"Phases finales":(S.haute&&S.haute.pools)?"Après-midi":"Poules de qualif.";
  const tabs=[["classements","Classements"],["matchs","Matchs"],["finales","Finales"],["equipe","Mon équipe"]];
  return `<div class="spec">
    <div class="spec-head"><div class="brand"><div class="ball"></div><div><h1>${esc(t.name||"Tournoi")}</h1><small>${[t.date,t.location].filter(Boolean).map(esc).join(" · ")||"Beach Volley"}</small></div></div>
      <span class="live-badge"><span class="dot"></span>LIVE · ${esc(phase)}</span></div>
    <div class="spec-tabs">${tabs.map(([k,l])=>`<button class="${specTab===k?'on':''}" onclick="specGo('${k}')">${l}</button>`).join("")}</div>
    <div class="spec-body">${specBody()}</div>
    <div class="spec-foot"><a href="${liveBase()}">Cap Homard · Gestion de tournoi</a></div></div>`;
}
function specBody(){if(specTab==="equipe")return specSearch();if(specTab==="matchs")return specMatches();if(specTab==="finales")return specFinals();return specStandings();}
function statusBadge(st){return `<span class="st-badge ${st.cls}">${st.label}</span>`;}
function specStandtable(pool,phase,idx){
  const st=poolStandings(pool),qpp=S.config.qualifPerPool;
  const rows=st.ordered.map(x=>{const up=phase==="qualif"&&x.rank>0&&x.rank<=qpp;
    return `<tr class="${x.rank===1?'r1':''} ${up?'qd':''}"><td><span class="rk">${x.rank||'-'}</span></td><td class="nm">${esc(teamName(x.id))}</td><td>${x.w}</td><td>${x.l}</td><td>${x.pf}</td><td>${x.pc}</td><td>${x.diff>=0?'+':''}${x.diff}</td><td class="cf">${fmtCoeff(x.coeff)}</td></tr>`;}).join("");
  const ci=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx);
  const label=phase==="qualif"?"Poule "+plabel(idx):phase==="haute"?"Poule H"+(idx+1):"Poule C"+(idx+1);
  return `<div class="card spec-pool"><div class="spec-pool-h"><b>${label}</b><span class="court">${esc(courtName(ci.court-1))}${ci.rotation>1?' · rot.'+ci.rotation:''}</span></div>
    <table class="standtbl spec-tbl"><thead><tr><th></th><th style="text-align:left">Équipe</th><th>V</th><th>D</th><th>P+</th><th>P-</th><th>Diff</th><th>Coeff</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function specStandings(){
  if(!S.qualif||!S.qualif.pools)return `<div class="card"><p class="muted">Le tournoi n'a pas encore commencé.</p></div>`;
  let html="";
  if(S.haute&&S.haute.pools){
    html+=`<h3 class="spec-sec coral">▲ Tableau Haut</h3>`+S.haute.pools.map((p,i)=>specStandtable(p,"haute",i)).join("");
    html+=`<h3 class="spec-sec sea">▼ Consolante</h3>`+S.basse.pools.map((p,i)=>specStandtable(p,"basse",i)).join("");
    html+=`<h3 class="spec-sec">Qualification (matin)</h3>`+S.qualif.pools.map((p,i)=>specStandtable(p,"qualif",i)).join("");
  } else html+=S.qualif.pools.map((p,i)=>specStandtable(p,"qualif",i)).join("");
  return html;
}
function specMatchList(pool,phase,idx){
  const ci=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx),cn=courtName(ci.court-1);
  const label=phase==="qualif"?"Poule "+plabel(idx):phase==="haute"?"Poule H"+(idx+1):"Poule C"+(idx+1);
  const rows=pool.matches.map((m,mi)=>{const s=pool.scores[mi]||["",""];const played=s[0]!==""&&s[1]!=="";
    const w1=played&&+s[0]>+s[1],w2=played&&+s[1]>+s[0];
    return `<div class="spec-match ${played?'done':'todo'}"><span class="t1 ${w1?'w':''}">${esc(teamName(pool.teams[m.i]))}</span><span class="sc">${played?`${s[0]} - ${s[1]}`:'vs'}</span><span class="t2 ${w2?'w':''}">${esc(teamName(pool.teams[m.j]))}</span></div>`;}).join("");
  return `<div class="card spec-pool"><div class="spec-pool-h"><b>${label}</b><span class="court">${esc(cn)}</span></div>${rows}</div>`;
}
function specMatches(){
  if(!S.qualif||!S.qualif.pools)return `<div class="card"><p class="muted">Aucun match pour l'instant.</p></div>`;
  if(S.haute&&S.haute.pools)return `<h3 class="spec-sec coral">▲ Tableau Haut</h3>`+S.haute.pools.map((p,i)=>specMatchList(p,"haute",i)).join("")+`<h3 class="spec-sec sea">▼ Consolante</h3>`+S.basse.pools.map((p,i)=>specMatchList(p,"basse",i)).join("");
  return S.qualif.pools.map((p,i)=>specMatchList(p,"qualif",i)).join("");
}
function specFinals(){
  const h=S.finals&&S.finals.haute,b=S.finals&&S.finals.basse;
  if(!h&&!b)return `<div class="card"><p class="muted">Les phases finales ne sont pas encore générées.</p></div>`;
  let html="";
  if(h)html+=`<h3 class="spec-sec coral">🏆 Tableau principal</h3>`+specBracket(h)+explainBlock(S.haute.pools,h,"H","Tableau principal","var(--coral)");
  if(b)html+=`<h3 class="spec-sec sea">🥈 Consolante</h3>`+specBracket(b)+explainBlock(S.basse.pools,b,"C","Consolante","var(--sea)");
  return html;
}
function specBracket(br){
  advance(br);const total=br.rounds.length;
  const cols=br.rounds.map((rd,ri)=>{const rem=total-ri;
    return `<div class="round"><h4>${roundName(rem)}</h4>${rd.map(m=>{const w=bWin(m);const tr=(tm,sc)=>`<div class="bteam ${w&&tm&&w.id===tm.id?'win':''}"><span class="bn">${tm?esc(teamName(tm.id)):'—'}</span><span class="bs">${sc}</span></div>`;return `<div class="bmatch">${tr(m.a,m.sa)}${tr(m.b,m.sb)}</div>`;}).join("")}</div>`;}).join("");
  let pet="";const pm=br.extra&&br.extra.petite;
  if(pm&&pm.a&&pm.b){const w=bWin(pm);const tr=(tm,sc)=>`<div class="bteam ${w&&tm&&w.id===tm.id?'win':''}"><span class="bn">${tm?esc(teamName(tm.id)):'—'}</span><span class="bs">${sc}</span></div>`;pet=`<div class="round"><h4>Petite finale</h4><div class="bmatch">${tr(pm.a,pm.sa)}${tr(pm.b,pm.sb)}</div></div>`;}
  return `<div class="card" style="overflow-x:auto"><div class="rounds spec-rounds">${cols}${pet}</div></div>`;
}
function specSearch(){
  return `<div class="card"><input type="text" id="specSearchInput" placeholder="🔍 Nom de mon équipe…" value="${esc(specQuery)}" oninput="specQuery=this.value;document.getElementById('specRes').innerHTML=specSearchResults();"></div><div id="specRes">${specSearchResults()}</div>`;
}
function specSearchResults(){
  const q=(specQuery||"").trim().toLowerCase();
  if(!q)return `<p class="muted tiny" style="padding:0 4px">Tape le nom de ton équipe pour voir son classement, son statut et ses matchs.</p>`;
  const matches=S.teams.filter(t=>t.name.toLowerCase().includes(q));
  if(!matches.length)return `<p class="muted" style="padding:0 4px">Aucune équipe trouvée pour « ${esc(specQuery)} ».</p>`;
  return matches.slice(0,12).map(tm=>teamCard(tm.id)).join("");
}
function teamCard(id){
  const j=teamJourney(id);
  const steps=j.steps.map(s=>{const x=s.stat;
    return `<div class="jstep"><div class="jstep-h"><b>${esc(s.phase)}</b> ${s.repeche?'<span class="st-badge repe" style="font-size:9px">repêché</span>':''}<span class="court">${esc(s.pool)} · ${s.pos}${s.pos===1?'er':'e'}</span></div>${x?`<div class="jstat">${x.w}V · ${x.l}D · ${x.pf}-${x.pc} (diff ${x.diff>=0?'+':''}${x.diff}) · coeff ${fmtCoeff(x.coeff)}</div>`:""}</div>`;}).join("");
  return `<div class="card team-card"><div class="tc-head"><div class="tc-name">${esc(teamName(id))}</div>${statusBadge(j.status)}</div>${steps||'<p class="muted tiny">Pas encore de match joué.</p>'}</div>`;
}

boot();
</script>
</body>
</html>
