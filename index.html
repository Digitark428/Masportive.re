/* ===================== 8. PHASES FINALES ===================== */
function hbComplete(store){return store.pools&&store.pools.every(p=>poolStandings(p).complete);}

/* ===================== SUPER CONSOLANTE & CHALLENGE (phases optionnelles) =====================
   Créées à la demande à partir des équipes NON qualifiées pour un tableau final :
     - Super Consolante  ← équipes non qualifiées du Tableau Principal (poules hautes)
     - Challenge         ← équipes non qualifiées du Tableau Consolante (poules basses)
   Deux modes : poules (round-robin, arbitres, classement) ou tableau direct (élimination).
   100% optionnel : si l'organisateur ne les crée pas, le tournoi fonctionne comme avant. */
const EXTRA_SRC={superconso:"haute",challenge:"basse"};
function extraTitle(key){return key==="superconso"?"Super Consolante":"Challenge";}
function extraTeamRecs(key){
  const source=EXTRA_SRC[key];
  const pools=source==="haute"?(S.haute&&S.haute.pools):(S.basse&&S.basse.pools);
  const bracket=source==="haute"?(S.finals&&S.finals.haute):(S.finals&&S.finals.basse);
  if(!pools||!bracket)return [];
  const ex=explainQualification(pools,bracket); if(!ex)return [];
  const outIds=ex.rows.filter(r=>!r.qualified).map(r=>r.id);
  return outIds.map(id=>{
    for(let pi=0;pi<pools.length;pi++){const o=poolStandings(pools[pi]).ordered;const k=o.findIndex(x=>x.id===id);
      if(k>=0){const e=o[k];return {id,pos:k+1,coeff:e.coeff===Infinity?1e9:e.coeff,w:e.w,ckey:e.ckey,diff:e.diff,poolIndex:pi};}}
    return {id,pos:9,coeff:0,w:0,ckey:0,diff:0,poolIndex:0};
  });
}
// Propositions automatiques de répartition en poules (plusieurs formats plausibles).
function extraPoolOptions(n){
  const opts=[]; const seen=new Set();
  for(let k=1;k<=Math.floor(n/2)&&k<=8;k++){
    const s=evenPartition(n,k); const mx=Math.max(...s),mn=Math.min(...s);
    if(mx>6||mn<3)continue;
    const key=s.join("-"); if(seen.has(key))continue; seen.add(key);
    opts.push({k,sizes:s});
  }
  if(!opts.length)opts.push({k:1,sizes:[n]});
  return opts;
}
function createExtraPools(key,nbPools){
  const recs=extraTeamRecs(key);
  if(recs.length<3){toast("Il faut au moins 3 équipes");return;}
  const sizes=nbPools?evenPartition(recs.length,nbPools):bestSizes(recs.length);
  const co=morningCoPool();
  const res=buildAfternoonPools(recs,sizes,co);
  S[key]={source:EXTRA_SRC[key],mode:"pools",pools:res.poolIds.map(ids=>buildPool(ids)),bracket:null};
  extraAssist=null; persist(); render(); toast(extraTitle(key)+" créée en poules");
}
function createExtraBracket(key){
  const recs=extraTeamRecs(key);

  const ranked=recs.map(r=>({id:r.id,poolIndex:r.poolIndex}));
  S[key]={source:EXTRA_SRC[key],mode:"bracket",pools:null,bracket:makeBracket(ranked)};
  extraAssist=null; persist(); render(); toast(extraTitle(key)+" créée en tableau");
}

function ensureFinals(fill){

function renderBracket(side){

  }

   <div class="rounds">${cols}${petite}</div>`;

function bmatchHTML(side,ri,mi,m,editable,courtTag){
  const w=bWin(m);
  const teamRow=(t,score,which)=>{

function liveBase(){return location.href.split("#")[0];}
function encodeSnapshot(t){
  const st=t.state, ids=st.teams.map(x=>x.id), ix=new Map(ids.map((id,i)=>[id,i]));
  const packPool=p=>({t:p.teams.map(id=>ix.get(id)),s:p.scores.map(sc=>(sc&&sc[0]!==""&&sc[1]!=="")?[+sc[0],+sc[1]]:0)});
  const packBr=br=>{if(!br)return null;advance(br);return {z:br.size,r:br.rounds.map(rd=>rd.map(m=>[m.sa===""?-1:+m.sa,m.sb===""?-1:+m.sb])),p:[br.extra&&br.extra.petite&&br.extra.petite.sa!==""?+br.extra.petite.sa:-1,br.extra&&br.extra.petite&&br.extra.petite.sb!==""?+br.extra.petite.sb:-1]};};
  const packXBr=br=>{if(!br)return null;advance(br);return {z:br.size,
    t0:br.rounds[0].map(m=>[m.a?ix.get(m.a.id):-1,m.b?ix.get(m.b.id):-1,(m.a&&m.a.poolIndex!=null)?m.a.poolIndex:-1,(m.b&&m.b.poolIndex!=null)?m.b.poolIndex:-1]),
    r:br.rounds.map(rd=>rd.map(m=>[m.sa===""?-1:+m.sa,m.sb===""?-1:+m.sb])),
    p:[br.extra&&br.extra.petite&&br.extra.petite.sa!==""?+br.extra.petite.sa:-1,br.extra&&br.extra.petite&&br.extra.petite.sb!==""?+br.extra.petite.sb:-1]};};
  const packX=x=>x?{m:x.mode,s:x.source,P:x.pools?x.pools.map(packPool):null,B:packXBr(x.bracket)}:null;
  const snap={v:1,n:t.name,d:t.date,l:t.location,
    c:{pts:st.config.points,wb:st.config.winBy||"sec",af:st.config.afternoonFormat||null,fs:st.config.finalsSize||null,qpp:st.config.qualifPerPool,rm:st.config.rankMode||"wins",cn:st.config.courtNames,ci:st.config.centralIndex,cr:st.config.courts},
    T:st.teams.map(x=>x.name),
    Q:st.qualif&&st.qualif.pools?st.qualif.pools.map(packPool):null,

    XS:packX(st.superconso),XC:packX(st.challenge),

function decodeSnapshot(str){
  const o=JSON.parse(LZString.decompressFromEncodedURIComponent(str));
  const teams=o.T.map((name,i)=>({id:String(i),name,seed:false}));
  const unpackPool=pp=>{const ids=pp.t.map(i=>String(i));const pool=buildPool(ids);
    pool.scores=pool.matches.map((m,k)=>{const s=pp.s[k];return (s&&s.length===2)?[s[0],s[1]]:["",""];});return pool;};
  const state={config:{name:o.n,points:o.c.pts,winBy:o.c.wb||"sec",afternoonFormat:o.c.af||null,finalsSize:o.c.fs||null,qualifPerPool:o.c.qqp||o.c.qpp,rankMode:o.c.rm,courtNames:o.c.cn||[],centralIndex:o.c.ci==null?-1:o.c.ci,courts:o.c.cr||1,poolSizeTarget:5,demoTeams:40},
    teams, qualif:{pools:o.Q?o.Q.map(unpackPool):null}, haute:{pools:o.H?o.H.map(unpackPool):null}, basse:{pools:o.B?o.B.map(unpackPool):null}, finals:{haute:null,basse:null}, superconso:null, challenge:null,
    _repeche:{count:(o.RP||[]).length,ids:(o.RP||[]).map(i=>String(i))}};
  const unpackXBr=px=>{if(!px)return null;
    const r0=px.t0.map(([ia,ib,pa,pb])=>({a:ia>=0?{id:String(ia),seed:false,poolIndex:pa<0?null:pa}:null,b:ib>=0?{id:String(ib),seed:false,poolIndex:pb<0?null:pb}:null,sa:"",sb:""}));
    const br={size:px.z,rounds:[r0],extra:{petite:{sa:"",sb:""}}};advance(br);
    (px.r||[]).forEach((rd,ri)=>{if(br.rounds[ri])rd.forEach((sc,mi)=>{if(br.rounds[ri][mi]){br.rounds[ri][mi].sa=sc[0]<0?"":sc[0];br.rounds[ri][mi].sb=sc[1]<0?"":sc[1];}});advance(br);});
    if(px.p&&br.extra&&br.extra.petite){br.extra.petite.sa=px.p[0]<0?"":px.p[0];br.extra.petite.sb=px.p[1]<0?"":px.p[1];}return br;};
  const unpackX=x=>x?{mode:x.m,source:x.s,pools:x.P?x.P.map(unpackPool):null,bracket:unpackXBr(x.B)}:null;
  state.superconso=unpackX(o.XS);state.challenge=unpackX(o.XC);
  const prevS=S;S=state; // contexte pour reconstruire les tableaux (classement)
  const rebuildBr=(packed,pools)=>{if(!packed||!pools)return null;const br=makeBracket(rankAllFromPools(pools));if(!br)return null;advance(br);
    (packed.r||[]).forEach((rd,ri)=>{if(br.rounds[ri])rd.forEach((sc,mi)=>{if(br.rounds[ri][mi]){br.rounds[ri][mi].sa=sc[0]<0?"":sc[0];br.rounds[ri][mi].sb=sc[1]<0?"":sc[1];}});advance(br);});
    if(packed.p&&br.extra&&br.extra.petite){br.extra.petite.sa=packed.p[0]<0?"":packed.p[0];br.extra.petite.sb=packed.p[1]<0?"":packed.p[1];}return br;};
  state.finals.haute=rebuildBr(o.FH,state.haute.pools);
  state.finals.basse=rebuildBr(o.FB,state.basse.pools);
  S=prevS;
  return {id:"snap",name:o.n,date:o.d,location:o.l,state};
}

function poolPosOf(pools,id){if(!pools)return null;for(let i=0;i<pools.length;i++){const o=poolStandings(pools[i]).ordered;const k=o.findIndex(x=>x.id===id);if(k>=0)return{poolIndex:i,pos:k+1,stat:o[k],complete:poolStandings(pools[i]).complete};}return null;}
function bracketStatusOf(br,id){
  if(!br)return null;advance(br);const total=br.rounds.length;let last=-1,lm=null;
  for(let r=0;r<total;r++)for(const m of br.rounds[r])if((m.a&&m.a.id===id)||(m.b&&m.b.id===id)){last=r;lm=m;}
  const pm=br.extra&&br.extra.petite;
  if(pm&&((pm.a&&pm.a.id===id)||(pm.b&&pm.b.id===id))){if(pm.sa!==""&&pm.sb!==""){const w=bWin(pm);return w&&w.id===id?{label:"3e place 🥉",cls:"ok"}:{label:"4e place",cls:"sea"};}return{label:"Petite finale (à jouer)",cls:"play"};}
  if(last<0)return null;
  const champ=bWin(br.rounds[total-1][0]);if(champ&&champ.id===id)return{label:"🏆 Vainqueur",cls:"gold"};
  if(lm&&lm.sa!==""&&lm.sb!==""){const w=bWin(lm);if(w&&w.id===id)return{label:"Qualifié(e) — tour suivant",cls:"ok"};return{label:"Éliminé(e) en "+roundName(total-last),cls:"out"};}
  return{label:"En lice — "+roundName(total-last),cls:"play"};
}
function teamJourney(id){
  const steps=[];let status={label:"Inscrit(e)",cls:""};
  const qp=S.qualif&&S.qualif.pools;
  if(!qp)return{steps,status};
  const qi=poolPosOf(qp,id);
  const qComplete=qp.every(p=>poolStandings(p).complete);
  if(qi)steps.push({phase:"Poule de qualification",pool:plabel(qi.poolIndex),pos:qi.pos,stat:qi.stat,complete:qi.complete});
  const hi=poolPosOf(S.haute&&S.haute.pools,id),bi=poolPosOf(S.basse&&S.basse.pools,id);
  const repeche=S._repeche&&S._repeche.ids&&S._repeche.ids.indexOf(id)>=0;
  if(hi)steps.push({phase:"Tableau Haut",pool:"H"+(hi.poolIndex+1),pos:hi.pos,stat:hi.stat,complete:hi.complete,repeche});
  if(bi)steps.push({phase:"Consolante",pool:"C"+(bi.poolIndex+1),pos:bi.pos,stat:bi.stat,complete:bi.complete});
  if(!qComplete){status={label:qi?"En poule — qualification":"Inscrit(e)",cls:"play"};return{steps,status};}
  if(hi)status=repeche?{label:"Repêché(e) — Tableau Haut",cls:"repe"}:{label:"Qualifié(e) — Tableau Haut",cls:"ok"};
  else if(bi)status={label:"En Consolante",cls:"sea"};
  else status={label:"Éliminé(e) en poules",cls:"out"};
  const fin=hi?(S.finals&&S.finals.haute):bi?(S.finals&&S.finals.basse):null;
  const afterComplete=(hi&&S.haute.pools.every(p=>poolStandings(p).complete))||(bi&&S.basse.pools.every(p=>poolStandings(p).complete));
  if(fin){const bs=bracketStatusOf(fin,id);if(bs)status=bs;else if(afterComplete)status={label:"Non qualifié(e) pour le tableau",cls:"out"};}
  return{steps,status};
}
function explainQualification(pools,bracket){
  if(!bracket||!pools||!pools.length)return null;
  const byPos={};
  pools.forEach((p,pi)=>poolStandings(p).ordered.forEach((e,idx)=>{(byPos[idx]=byPos[idx]||[]).push({id:e.id,pos:idx+1,poolIndex:pi,w:e.w,coeff:e.coeff,ckey:e.ckey,diff:e.diff});}));
  const order=[];Object.keys(byPos).map(Number).sort((a,b)=>a-b).forEach(pos=>{[...byPos[pos]].sort(crossCmp).forEach(x=>order.push(x));});
  const size=bracket.size;
  const posGroups={};order.forEach((x,i)=>{(posGroups[x.pos]=posGroups[x.pos]||[]).push(i);});
  const rows=order.map((x,i)=>{
    const qualified=i<size;const grp=posGroups[x.pos];const grpAllIn=grp[grp.length-1]<size;const grpAllOut=grp[0]>=size;
    const coeffTxt=x.coeff===Infinity?"Max":(x.coeff||0).toFixed(2);
    let why;
    if(qualified){
      if(grpAllIn)why=`${x.pos}<sup>${x.pos===1?'re':'e'}</sup> de la poule {P}${x.poolIndex+1}`;
      else why=`meilleur ${x.pos}<sup>e</sup> (${x.w} victoire${x.w>1?'s':''}, coeff ${coeffTxt}, diff ${x.diff>=0?'+':''}${x.diff})`;
    } else {
      if(grpAllOut)why=`${x.pos}<sup>e</sup> de poule — en Super Consolante`;
      else why=`${x.pos}<sup>e</sup> — en Super Consolante (derrière au départage : ${x.w} victoire${x.w>1?'s':''}, coeff ${coeffTxt}, diff ${x.diff>=0?'+':''}${x.diff})`;
    }
    return {id:x.id,qualified,why,poolIndex:x.poolIndex};
  });
  return {rows,size,total:order.length}; // liste complète : aucune équipe non qualifiée n'est masquée
}
function explainBlock(pools,bracket,prefix,title,col){
  const ex=explainQualification(pools,bracket);if(!ex)return "";
  const lis=ex.rows.map((r,i)=>`<li class="${r.qualified?'q-in':'q-out'}">${i===ex.size?'<div class="cutline">barre de qualification pour le tableau final</div>':''}<span class="q-badge">${r.qualified?'✓':'SC'}</span><b>${esc(teamName(r.id))}</b> — ${r.why.replace('{P}',prefix)}</li>`).join("");

/* Liste COMPLÈTE des équipes non qualifiées pour un tableau final → Super Consolante.
   Réutilise exactement la logique de qualification existante (aucun calcul parallèle). */
function superConsolanteBlock(){

    const ex=explainQualification(pools,bracket); if(!ex)return;
    const outs=ex.rows.filter(r=>!r.qualified);

  };

let specTab="matin", specQuery="";
let _specTimer=null, _specSig=null, _specId=null;

/* ===================== SAISIE DES SCORES PAR LES JOUEURS (optionnel) =====================
   - Activé par l'organisateur via S.config.playerEntry (désactivé par défaut → mode classique).
   - Les joueurs saisissent depuis la vue live ; chaque saisie est INSÉRÉE dans la table
     'score_submissions' (file append-only → aucune écriture concurrente sur le tournoi).
   - La vue live superpose ces soumissions à l'affichage (résultat visible immédiatement).
   - L'app organisateur consolide ces soumissions dans le tournoi puis les purge.            */

function slotSafe(slot){return String(slot).replace(/\|/g,"_");}
function playerEntryOn(state){return !!(state&&state.config&&state.config.playerEntry);}

// Applique un score (identifié par "slot") directement dans un state de tournoi. Sans effet de bord destructeur.
function applyScoreSlot(state,slot,a,b){
  if(!state)return false;
  const p=String(slot).split("|");
  if(p[0]==="qualif"||p[0]==="haute"||p[0]==="basse"||p[0]==="superconso"||p[0]==="challenge"){
    const store=p[0]==="qualif"?state.qualif:p[0]==="haute"?state.haute:p[0]==="basse"?state.basse:state[p[0]];
    if(!store||!store.pools)return false;
    const pool=store.pools[+p[1]]; if(!pool||!pool.scores||!pool.scores[+p[2]])return false;
    pool.scores[+p[2]]=[a,b]; return true;
  }
  if(p[0]==="fh"||p[0]==="fb"||p[0]==="fsc"||p[0]==="fch"){
    const br=p[0]==="fh"?(state.finals&&state.finals.haute):p[0]==="fb"?(state.finals&&state.finals.basse):p[0]==="fsc"?(state.superconso&&state.superconso.bracket):(state.challenge&&state.challenge.bracket);
    if(!br)return false;
    if(p[1]==="p"){ if(br.extra&&br.extra.petite&&br.extra.petite.a&&br.extra.petite.b){br.extra.petite.sa=a;br.extra.petite.sb=b;return true;} return false; }
    const round=br.rounds&&br.rounds[+p[1]]; if(!round||!round[+p[2]])return false;
    const m=round[+p[2]]; if(!m.a||!m.b)return false;
    m.sa=a; m.sb=b; try{advance(br);}catch(e){} return true;
  }
  return false;
}

// Liste les matchs d'une équipe (poules + finales), avec leur slot et leur score actuel.
function playerMatches(state,teamId){
  const out=[];
  const addPool=(key,label,store)=>{
    if(!store||!store.pools)return;
    store.pools.forEach((pool,pi)=>{
      if(!pool.teams||pool.teams.indexOf(teamId)<0)return;
      pool.matches.forEach((m,mi)=>{
        const a=pool.teams[m.i],b=pool.teams[m.j];
        if(a!==teamId&&b!==teamId)return;
        const s=pool.scores[mi]||["",""];
        out.push({slot:`${key}|${pi}|${mi}`,phase:label,aId:a,bId:b,sa:s[0],sb:s[1],
          played:s[0]!==""&&s[1]!==""&&s[0]!=null&&s[1]!=null});
      });
    });
  };
  addPool("qualif","Poule de qualification",state.qualif);
  addPool("haute","Poule — Tableau Haut",state.haute);
  addPool("basse","Poule — Consolante",state.basse);
  addPool("superconso","Super Consolante",state.superconso);
  addPool("challenge","Challenge",state.challenge);
  const addBr=(key,label,br)=>{
    if(!br||!br.rounds)return;
    try{advance(br);}catch(e){}
    br.rounds.forEach((round,ri)=>round.forEach((m,mi)=>{
      if(!m.a||!m.b)return;
      if(m.a.id!==teamId&&m.b.id!==teamId)return;
      out.push({slot:`${key}|${ri}|${mi}`,phase:label+" · "+roundName(br.rounds.length-ri),aId:m.a.id,bId:m.b.id,
        sa:m.sa,sb:m.sb,played:m.sa!==""&&m.sb!==""});
    }));
    const pm=br.extra&&br.extra.petite;
    if(pm&&pm.a&&pm.b&&(pm.a.id===teamId||pm.b.id===teamId))
      out.push({slot:`${key}|p|0`,phase:label+" · Petite finale (3e place)",aId:pm.a.id,bId:pm.b.id,sa:pm.sa,sb:pm.sb,
        played:pm.sa!==""&&pm.sb!==""});
  };
  addBr("fh","Tableau principal",state.finals&&state.finals.haute);
  addBr("fb","Consolante",state.finals&&state.finals.basse);
  addBr("fsc","Super Consolante",state.superconso&&state.superconso.bracket);
  addBr("fch","Challenge",state.challenge&&state.challenge.bracket);
  return out;
}

// Bloc HTML de saisie pour une équipe (affiché dans l'onglet « Mon équipe » de la vue live).
function playerEntryBlock(teamId){
  if(!playerEntryOn(S)||window._specMode!=="live"||!sb)return "";
  const ms=playerMatches(S,teamId);
  if(!ms.length)return "";
  const rows=ms.map(m=>{
    const sid=slotSafe(m.slot);
    const done=m.played?`<span class="pe-done">✓ ${esc(m.sa)}–${esc(m.sb)}</span>`:"";
    return `<div class="pe-match">

        <span class="pe-tm right">${esc(teamName(m.bId))}</span>
        <button class="btn primary sm" onclick="submitScore('${m.slot}')">${m.played?"Corriger":"Valider"}</button>

  return `<div class="card pe-card">

    ${rows}
  </div>`;
}

async function submitScore(slot){
  if(!sb){toast("Hors-ligne — réessaie avec du réseau");return;}
  const sid=slotSafe(slot);
  const ea=document.getElementById("se_a_"+sid),eb=document.getElementById("se_b_"+sid);
  if(!ea||!eb)return;
  const a=ea.value,b=eb.value;
  if(a===""||b===""){toast("Entre les deux scores");return;}
  const tid=window._specTid;if(!tid)return;
  try{
    const {error}=await sb.from("score_submissions").insert({tournament_id:tid,slot,score_a:+a,score_b:+b});
    if(error)throw error;
    applyScoreSlot(S,slot,+a,+b); // reflet immédiat à l'écran
    _specSig=JSON.stringify(S);
    document.getElementById("root").innerHTML=spectatorView(window._specT||{name:"",state:S});
    toast("Score envoyé ✅");
  }catch(e){ console.error("[live] envoi score :",e&&e.message); toast("Erreur — réessaie"); }
}

// Lit les soumissions d'un tournoi et les applique à un state (ordre chronologique → la dernière gagne).
async function overlaySubmissions(state,tid){
  if(!sb||!tid)return;
  try{
    const {data,error}=await sb.from("score_submissions").select("slot,score_a,score_b,created_at").eq("tournament_id",tid).order("created_at",{ascending:true});
    if(error){console.error("[live] lecture soumissions :",error.message);return;}
    (data||[]).forEach(s=>applyScoreSlot(state,s.slot,s.score_a,s.score_b));
  }catch(e){ console.error("[live] overlay :",e&&e.message); }
}

// CÔTÉ ORGANISATEUR : consolide les soumissions des joueurs dans les tournois, puis les purge.
let _consolidateTimer=null;
function startConsolidation(){ clearInterval(_consolidateTimer); _consolidateTimer=setInterval(consolidateLoop,8000); consolidateLoop(); }
async function consolidateLoop(){
  if(!sb||!cloudReady||!authed||!DB.tournaments.length)return;
  try{
    const ids=DB.tournaments.map(t=>t.id);
    const {data:subs,error}=await sb.from("score_submissions").select("id,tournament_id,slot,score_a,score_b").in("tournament_id",ids);
    if(error){console.error("[live] lecture soumissions (orga) :",error.message);return;}
    if(!subs||!subs.length)return;
    const purge=[],touched=new Set();
    subs.forEach(s=>{
      const t=DB.tournaments.find(x=>x.id===s.tournament_id); if(!t)return;
      const ok=applyScoreSlot(t.state,s.slot,s.score_a,s.score_b);
      if(ok)touched.add(t.id);
      purge.push(s.id); // on purge dans tous les cas (slot appliqué ou devenu obsolète)
    });
    if(touched.size){
      touched.forEach(id=>{const t=DB.tournaments.find(x=>x.id===id);if(t)t.updatedAt=Date.now();});
      cacheLocal(); await cloudFlush();
      console.log("[live] ✅",touched.size,"tournoi(s) mis à jour depuis les scores joueurs.");
      // Re-render seulement sur la liste des tournois (aucun champ de saisie → pas de gêne pour l'orga).
      if(!parseHash()&&!currentId)render();
    }
    if(purge.length){ const {error:de}=await sb.from("score_submissions").delete().in("id",purge); if(de)console.error("[live] purge :",de.message); }
  }catch(e){ console.error("[live] consolidation :",e&&e.message); }
}

function specError(msg){return `<div class="spec"><div class="spec-head"><div class="brand"><div class="ball"></div><div><h1>Cap Homard — Live</h1></div></div></div><div class="spec-body"><div class="card"><div class="empty"><div class="big">📡</div><h4>Indisponible</h4><p class="muted">${esc(msg)}</p><a class="btn" style="margin-top:14px" href="${liveBase()}">← Accueil</a></div></div></div></div>`;}
function specLoading(){return `<div class="spec"><div class="spec-head"><div class="brand"><div class="ball"></div><div><h1>Cap Homard — Live</h1></div></div></div><div class="spec-body"><div class="card"><div class="empty"><div class="big">📡</div><h4>Chargement du tournoi…</h4><p class="muted">Récupération des résultats en direct.</p></div></div></div></div>`;}

function renderSpectator(sp,root){
  // Mode "instantané" (#/v/…) : tout est embarqué dans le lien, aucun réseau requis.
  if(sp.mode==="snap"){
    stopLive(); window._specMode="snap"; window._specTid=null;
    let t=null,err=null;
    try{ t=decodeSnapshot(sp.data); }catch(e){ err="Lien invalide ou illisible."; }
    if(err){root.innerHTML=specError(err);return;}
    S=t.state;ensureCourts();window._specT=t;root.innerHTML=spectatorView(t);return;
  }
  // Mode "live" stable (#/live/<id>) : le lien ne change jamais, le contenu est lu depuis Supabase.
  const id=sp.id; _specId=id; window._specMode="live"; window._specTid=id;
  const local=DB.tournaments.find(x=>x.id===id);
  if(local){ S=local.state;ensureCourts();window._specT=local;_specSig=JSON.stringify(local.state);root.innerHTML=spectatorView(local); }
  else { root.innerHTML=specLoading(); _specSig=null; }
  refreshLive(id,true);
  clearInterval(_specTimer);
  _specTimer=setInterval(()=>refreshLive(id,false),15000); // rafraîchissement automatique du live
}
function stopLive(){ if(_specTimer){clearInterval(_specTimer);_specTimer=null;} _specId=null; }
async function refreshLive(id,firstLoad){
  // Attend que le client Supabase soit prêt (au cas où le spectateur ouvre le lien à froid).
  for(let i=0;i<30 && !sb;i++){ await new Promise(r=>setTimeout(r,200)); }
  let t=null;
  if(sb){
    try{
      const {data,error}=await sb.from("tournaments").select("data").eq("id",id).maybeSingle();
      if(error){ console.error("[live] erreur chargement :",error.message); }
      else if(data && data.data){ t=data.data; }
    }catch(e){ console.error("[live] exception :",e&&e.message); }
  }
  if(!t) t=DB.tournaments.find(x=>x.id===id)||null; // repli local si réseau indisponible
  // Superpose les scores saisis par les joueurs (file de soumissions) sur l'affichage.
  if(t&&t.state) await overlaySubmissions(t.state,id);
  // L'utilisateur a pu quitter la vue live entre-temps : on ne touche plus au DOM.
  const sp=parseHash();
  if(!sp || sp.mode!=="live" || sp.id!==id){ stopLive(); return; }
  const root=document.getElementById("root");
  if(!t){ if(firstLoad) root.innerHTML=specError("Ce tournoi est introuvable. Vérifie le lien, ou l'organisateur ne l'a pas encore enregistré dans le cloud."); return; }
  const sig=JSON.stringify(t.state);
  if(sig===_specSig && !firstLoad) return; // rien de neuf → on évite de re-render (préserve le scroll)
  _specSig=sig;
  S=t.state;ensureCourts();window._specT=t;
  root.innerHTML=spectatorView(t);
}
function specGo(tab){specTab=tab;document.getElementById("root").innerHTML=spectatorView(window._specT||{name:"",state:S});window.scrollTo(0,0);}
const SPEC_COL={matin:"#1E40AF",hautes:"#16A34A",conso:"#EA7317",superconso:"#7C3AED",challenge:"#F59E0B",principal:"#DC2626",consolante:"#92400E",equipe:"#334155"};
const SPEC_LAB={matin:["🟦","Poules matin"],hautes:["🟩","Hautes"],conso:["🟧","Consolantes"],superconso:["🟪","Super Conso."],challenge:["🟨","Challenge"],principal:["🟥","Tableau principal"],consolante:["🟫","Tableau conso."],equipe:["👤","Mon équipe"]};
function specHasExtra(key){const d=S[key];return !!(d&&(d.pools&&d.pools.length||d.bracket));}
function specAvailableTabs(){
  const T=[];
  if(S.qualif&&S.qualif.pools)T.push("matin");
  if(S.haute&&S.haute.pools)T.push("hautes");
  if(S.basse&&S.basse.pools)T.push("conso");
  if(specHasExtra("superconso"))T.push("superconso");
  if(specHasExtra("challenge"))T.push("challenge");
  if(S.finals&&S.finals.haute)T.push("principal");
  if(S.finals&&S.finals.basse)T.push("consolante");
  T.push("equipe");
  return T;
}
function specDefaultTab(){
  const a=specAvailableTabs();
  for(const k of ["principal","consolante","challenge","superconso","hautes","conso","matin"])if(a.includes(k))return k;
  return "equipe";
}
function specChampion(br){if(!br||!br.rounds||!br.rounds.length)return null;try{advance(br);}catch(e){}const last=br.rounds[br.rounds.length-1];return last&&last[0]?bWin(last[0]):null;}
function specStage(){
  if(S.finals&&S.finals.haute&&specChampion(S.finals.haute))return 4;
  if(S.finals&&(S.finals.haute||S.finals.basse))return 3;
  if(specHasExtra("superconso")||specHasExtra("challenge"))return 2;
  if(S.haute&&S.haute.pools)return 1;
  return 0;
}
function specProgress(){
  const stage=specStage(), hasSC=specHasExtra("superconso")||specHasExtra("challenge");
  const steps=[{lab:"Poules du matin",st:0},{lab:"Hautes / Consolantes",st:1}];
  if(hasSC)steps.push({lab:"Super C. / Challenge",st:2});
  steps.push({lab:"Phases finales",st:3},{lab:"🏆 Finale",st:4});
  return `<div class="spec-progress">`+steps.map((s,i)=>{
    const cls=stage>s.st?"done":stage===s.st?"active":"todo";
    return `${i>0?'<span class="sp-arrow">›</span>':''}<span class="sp-step ${cls}">${s.lab}</span>`;
  }).join("")+`</div>`;
}
function spectatorView(t){
  const avail=specAvailableTabs();
  if(!avail.includes(specTab))specTab=specDefaultTab();
  const phaseLabel={matin:"Poules du matin",hautes:"Poules Hautes",conso:"Poules Consolantes",superconso:"Super Consolante",challenge:"Challenge",principal:"Tableau Principal",consolante:"Tableau Consolante",equipe:"En direct"}[specTab]||"En direct";
  const tabsHtml=avail.map(k=>{const[em,lb]=SPEC_LAB[k];const col=SPEC_COL[k]||"#334155";const on=specTab===k;
    return `<button class="${on?'on':''}" style="${on?`background:${col};border-color:${col};color:#fff`:''}" onclick="specGo('${k}')">${em} ${lb}</button>`;}).join("");
  return `<div class="spec">
    <div class="spec-head"><div class="brand"><div class="ball"></div><div><h1>${esc(t.name||"Tournoi")}</h1><small>${[t.date,t.location].filter(Boolean).map(esc).join(" · ")||"Beach Volley"}</small></div></div>
      <span class="live-badge"><span class="dot"></span>LIVE · ${esc(phaseLabel)}</span></div>
    ${specProgress()}
    <div class="spec-tabs scrollx">${tabsHtml}</div>
    <div class="spec-body">${specBody()}</div>
    <div class="spec-foot"><a href="${liveBase()}">Cap Homard · Gestion de tournoi</a></div></div>`;
}
function specPhaseHead(emoji,title,sub,color){return `<div class="spec-phase-head" style="border-color:${color}"><span class="spe" style="background:${color}">${emoji}</span><div><h3 style="color:${color}">${title}</h3>${sub?`<p>${sub}</p>`:''}</div></div>`;}
function specPoolCombined(pool,phase,idx,label,color){
  const st=poolStandings(pool),qpp=S.config.qualifPerPool;
  let court="";
  if(phase==="qualif"){const ci=poolCourt(idx);court=courtName(ci.court-1)+(ci.rotation>1?' · rot.'+ci.rotation:'');}
  else if(phase==="haute"||phase==="basse"){const ci=afternoonCourt(phase,idx);court=courtName(ci.court-1)+(ci.rotation>1?' · rot.'+ci.rotation:'');}
  else if(pool.courtName)court=pool.courtName;
  const matchs=pool.matches.map((m,mi)=>{const s=pool.scores[mi]||["",""];const played=s[0]!==""&&s[1]!=="";const w1=played&&+s[0]>+s[1],w2=played&&+s[1]>+s[0];
    return `<div class="spec-match ${played?'done':'todo'}"><span class="t1 ${w1?'w':''}">${esc(teamName(pool.teams[m.i]))}</span><span class="sc">${played?`${s[0]} - ${s[1]}`:'vs'}</span><span class="t2 ${w2?'w':''}">${esc(teamName(pool.teams[m.j]))}</span></div>`;}).join("");
  const rows=st.ordered.map(x=>{const up=phase==="qualif"&&x.rank>0&&x.rank<=qpp;
    return `<tr class="${x.rank===1?'r1':''} ${up?'qd':''}"><td><span class="rk">${x.rank||'-'}</span></td><td class="nm">${esc(teamName(x.id))}</td><td>${x.w}</td><td>${x.l}</td><td>${x.diff>=0?'+':''}${x.diff}</td><td class="cf">${fmtCoeff(x.coeff)}</td></tr>`;}).join("");
  return `<div class="card spec-pool"><div class="spec-pool-h" style="border-left:4px solid ${color}"><b>${esc(label)}</b>${court?`<span class="court">${esc(court)}</span>`:''}</div>
    <div class="spec-matches-wrap">${matchs}</div>
    <table class="standtbl spec-tbl mini"><thead><tr><th></th><th style="text-align:left">Équipe</th><th>V</th><th>D</th><th>Diff</th><th>Coeff</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function specBody(){
  switch(specTab){
    case "matin": return specMorningTab();
    case "hautes": return specAfternoonTab("haute");
    case "conso": return specAfternoonTab("basse");
    case "superconso": return specExtraTab("superconso");
    case "challenge": return specExtraTab("challenge");
    case "principal": return specBracketTab("haute");
    case "consolante": return specBracketTab("basse");
    case "equipe": return specSearch();
    default: return specMorningTab();
  }
}
function specMorningTab(){
  const c=SPEC_COL.matin;
  if(!S.qualif||!S.qualif.pools)return specPhaseHead("🟦","Poules du matin","",c)+`<div class="card"><p class="muted">Le tournoi n'a pas encore commencé.</p></div>`;
  let html=specPhaseHead("🟦","Poules du matin",`Round-robin · ${formatLabel()} · ${S.config.qualifPerPool} qualifié(s) par poule vers le Tableau Haut`,c);
  html+=S.qualif.pools.map((p,i)=>specPoolCombined(p,"qualif",i,"Poule "+plabel(i),c)).join("");
  if(S.haute&&S.haute.pools){
    const hIds=[],bIds=[];
    S.haute.pools.forEach(p=>p.teams.forEach(id=>hIds.push(id)));
    (S.basse.pools||[]).forEach(p=>p.teams.forEach(id=>bIds.push(id)));
    html+=`<div class="card spec-qual"><h4 style="color:${SPEC_COL.hautes}">▲ Qualifiées en Poules Hautes (${hIds.length})</h4><div class="chips">${hIds.map(id=>`<span class="chip">${esc(teamName(id))}</span>`).join("")}</div>
      <h4 style="color:${SPEC_COL.conso};margin-top:14px">▼ En Poules Consolantes (${bIds.length})</h4><div class="chips">${bIds.map(id=>`<span class="chip">${esc(teamName(id))}</span>`).join("")}</div></div>`;
  } else html+=`<div class="note">Poules du matin en cours. La liste des qualifiées s'affichera une fois les scores saisis et la répartition générée.</div>`;
  return html;
}
function specAfternoonTab(side){
  const isH=side==="haute", c=isH?SPEC_COL.hautes:SPEC_COL.conso;
  const pools=isH?(S.haute&&S.haute.pools):(S.basse&&S.basse.pools);
  const emoji=isH?"🟩":"🟧", title=isH?"Poules Hautes":"Poules Consolantes";
  if(!pools)return specPhaseHead(emoji,title,"",c)+`<div class="card"><p class="muted">Poules pas encore générées.</p></div>`;
  let html=specPhaseHead(emoji,title,formatLabel(),c);
  html+=pools.map((p,i)=>specPoolCombined(p,side,i,(isH?"Poule H":"Poule C")+(i+1),c)).join("");
  const br=S.finals&&S.finals[side];
  if(br)html+=explainBlock(pools,br,isH?"H":"C",title,c);
  return html;
}
function specBracketTab(side){
  const isH=side==="haute", c=isH?SPEC_COL.principal:SPEC_COL.consolante;
  const emoji=isH?"🟥":"🟫", title=isH?"Tableau Principal":"Tableau Consolante";
  const br=S.finals&&S.finals[side];
  if(!br||br.size<2)return specPhaseHead(emoji,title,"",c)+`<div class="card"><p class="muted">Tableau non généré.</p></div>`;
  const champ=specChampion(br);
  return specPhaseHead(emoji,title,champ?`🏆 Vainqueur : ${esc(teamName(champ.id))}`:"Élimination directe",c)+specBracket(br);
}
function specExtraTab(key){
  const isSC=key==="superconso", c=isSC?SPEC_COL.superconso:SPEC_COL.challenge;
  const emoji=isSC?"🟪":"🟨", title=isSC?"Super Consolante":"Challenge", data=S[key];
  if(!data)return specPhaseHead(emoji,title,"",c)+`<div class="card"><p class="muted">Non créé.</p></div>`;
  let html=specPhaseHead(emoji,title,formatLabel(),c);
  if(data.pools&&data.pools.length)html+=data.pools.map((p,i)=>specPoolCombined(p,key,i,title+" "+(i+1),c)).join("");
  if(data.bracket){const champ=specChampion(data.bracket);if(champ)html+=`<div class="note" style="border-color:${c}">🏆 Vainqueur : <b>${esc(teamName(champ.id))}</b></div>`;html+=specBracket(data.bracket);}
  return html;
}
function statusBadge(st){return `<span class="st-badge ${st.cls}">${st.label}</span>`;}
function specStandtable(pool,phase,idx){
  const st=poolStandings(pool),qpp=S.config.qualifPerPool;
  const rows=st.ordered.map(x=>{const up=phase==="qualif"&&x.rank>0&&x.rank<=qpp;
    return `<tr class="${x.rank===1?'r1':''} ${up?'qd':''}"><td><span class="rk">${x.rank||'-'}</span></td><td class="nm">${esc(teamName(x.id))}</td><td>${x.w}</td><td>${x.l}</td><td>${x.pf}</td><td>${x.pc}</td><td>${x.diff>=0?'+':''}${x.diff}</td><td class="cf">${fmtCoeff(x.coeff)}</td></tr>`;}).join("");
  const ci=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx);
  const label=phase==="qualif"?"Poule "+plabel(idx):phase==="haute"?"Poule H"+(idx+1):"Poule C"+(idx+1);
  return `<div class="card spec-pool"><div class="spec-pool-h"><b>${label}</b><span class="court">${esc(courtName(ci.court-1))}${ci.rotation>1?' · rot.'+ci.rotation:''}</span></div>
    <table class="standtbl spec-tbl"><thead><tr><th></th><th style="text-align:left">Équipe</th><th>V</th><th>D</th><th>P+</th><th>P-</th><th>Diff</th><th>Coeff</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function specStandings(){
  if(!S.qualif||!S.qualif.pools)return `<div class="card"><p class="muted">Le tournoi n'a pas encore commencé.</p></div>`;
  let html="";
  if(S.haute&&S.haute.pools){
    html+=`<h3 class="spec-sec coral">▲ Tableau Haut</h3>`+S.haute.pools.map((p,i)=>specStandtable(p,"haute",i)).join("");
    html+=`<h3 class="spec-sec sea">▼ Consolante</h3>`+S.basse.pools.map((p,i)=>specStandtable(p,"basse",i)).join("");
    html+=`<h3 class="spec-sec">Qualification (matin)</h3>`+S.qualif.pools.map((p,i)=>specStandtable(p,"qualif",i)).join("");
  } else html+=S.qualif.pools.map((p,i)=>specStandtable(p,"qualif",i)).join("");
  return html;
}
function specMatchList(pool,phase,idx){
  const ci=phase==="qualif"?poolCourt(idx):afternoonCourt(phase,idx),cn=courtName(ci.court-1);
  const label=phase==="qualif"?"Poule "+plabel(idx):phase==="haute"?"Poule H"+(idx+1):"Poule C"+(idx+1);
  const rows=pool.matches.map((m,mi)=>{const s=pool.scores[mi]||["",""];const played=s[0]!==""&&s[1]!=="";
    const w1=played&&+s[0]>+s[1],w2=played&&+s[1]>+s[0];
    return `<div class="spec-match ${played?'done':'todo'}"><span class="t1 ${w1?'w':''}">${esc(teamName(pool.teams[m.i]))}</span><span class="sc">${played?`${s[0]} - ${s[1]}`:'vs'}</span><span class="t2 ${w2?'w':''}">${esc(teamName(pool.teams[m.j]))}</span></div>`;}).join("");
  return `<div class="card spec-pool"><div class="spec-pool-h"><b>${label}</b><span class="court">${esc(cn)}</span></div>${rows}</div>`;
}
function specMatches(){
  if(!S.qualif||!S.qualif.pools)return `<div class="card"><p class="muted">Aucun match pour l'instant.</p></div>`;
  if(S.haute&&S.haute.pools)return `<h3 class="spec-sec coral">▲ Tableau Haut</h3>`+S.haute.pools.map((p,i)=>specMatchList(p,"haute",i)).join("")+`<h3 class="spec-sec sea">▼ Consolante</h3>`+S.basse.pools.map((p,i)=>specMatchList(p,"basse",i)).join("");
  return S.qualif.pools.map((p,i)=>specMatchList(p,"qualif",i)).join("");
}
function specFinals(){
  const h=S.finals&&S.finals.haute,b=S.finals&&S.finals.basse;
  if(!h&&!b)return `<div class="card"><p class="muted">Les phases finales ne sont pas encore générées.</p></div>`;
  let html="";
  if(h)html+=`<h3 class="spec-sec coral">🏆 Tableau principal</h3>`+specBracket(h)+explainBlock(S.haute.pools,h,"H","Tableau principal","var(--coral)");
  if(b)html+=`<h3 class="spec-sec sea">🥈 Consolante</h3>`+specBracket(b)+explainBlock(S.basse.pools,b,"C","Consolante","var(--sea)");
  return html;
}
function specBracket(br){
  advance(br);const total=br.rounds.length;
  const cols=br.rounds.map((rd,ri)=>{const rem=total-ri;
    return `<div class="round"><h4>${roundName(rem)}</h4>${rd.map(m=>{const w=bWin(m);const tr=(tm,sc)=>`<div class="bteam ${w&&tm&&w.id===tm.id?'win':''}"><span class="bn">${tm?esc(teamName(tm.id)):'—'}</span><span class="bs">${sc}</span></div>`;return `<div class="bmatch">${tr(m.a,m.sa)}${tr(m.b,m.sb)}</div>`;}).join("")}</div>`;}).join("");
  let pet="";const pm=br.extra&&br.extra.petite;
  if(pm&&pm.a&&pm.b){const w=bWin(pm);const tr=(tm,sc)=>`<div class="bteam ${w&&tm&&w.id===tm.id?'win':''}"><span class="bn">${tm?esc(teamName(tm.id)):'—'}</span><span class="bs">${sc}</span></div>`;pet=`<div class="round"><h4>Petite finale</h4><div class="bmatch">${tr(pm.a,pm.sa)}${tr(pm.b,pm.sb)}</div></div>`;}
  return `<div class="card" style="overflow-x:auto"><div class="rounds spec-rounds">${cols}${pet}</div></div>`;
}
function specSearch(){
  return `<div class="card"><input type="text" id="specSearchInput" placeholder="🔍 Nom de mon équipe…" value="${esc(specQuery)}" oninput="specQuery=this.value;document.getElementById('specRes').innerHTML=specSearchResults();"></div><div id="specRes">${specSearchResults()}</div>`;
}
function specSearchResults(){
  const q=(specQuery||"").trim().toLowerCase();
  if(!q)return `<p class="muted tiny" style="padding:0 4px">Tape le nom de ton équipe pour voir son classement, son statut et ses matchs.</p>`;
  const matches=S.teams.filter(t=>t.name.toLowerCase().includes(q));
  if(!matches.length)return `<p class="muted" style="padding:0 4px">Aucune équipe trouvée pour « ${esc(specQuery)} ».</p>`;
  return matches.slice(0,12).map(tm=>teamCard(tm.id)).join("");
}
function teamCard(id){
  const j=teamJourney(id);
  const steps=j.steps.map(s=>{const x=s.stat;
    return `<div class="jstep"><div class="jstep-h"><b>${esc(s.phase)}</b> ${s.repeche?'<span class="st-badge repe" style="font-size:9px">repêché</span>':''}<span class="court">${esc(s.pool)} · ${s.pos}${s.pos===1?'er':'e'}</span></div>${x?`<div class="jstat">${x.w}V · ${x.l}D · ${x.pf}-${x.pc} (diff ${x.diff>=0?'+':''}${x.diff}) · coeff ${fmtCoeff(x.coeff)}</div>`:""}</div>`;}).join("");
  return `<div class="card team-card"><div class="tc-head"><div class="tc-name">${esc(teamName(id))}</div>${statusBadge(j.status)}</div>${steps||'<p class="muted tiny">Pas encore de match joué.</p>'}</div>`+playerEntryBlock(id);
}

boot();
</script>
